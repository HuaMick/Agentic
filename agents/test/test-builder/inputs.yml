required_reading:
  - path: CLAUDE.md
    reason: See agents/assets/guidelines/reference-claude-md.yml.
  - path: schemas/story.schema.json
    reason: See agents/assets/definitions/story-schema-contract.yml.
  - path: docs/guides/story-authoring.md
    reason: |
      The authoring rules that produced the story. Read the
      "acceptance.tests" section — it defines the one-to-one binding
      between a story and each test file, and the per-test justification
      rule that shapes every scaffold you write.
  - path: docs/decisions/0005-red-green-is-a-contract.md
    reason: |
      The ADR that defines this agent's authority. Defines the red-state
      evidence shape, the fail-closed rules, the preserve-existing rule,
      the boundary with build-rust during migration, and the 2026-04-24
      amendment narrowing "never edit existing tests" to a three-gate
      carve-out (per-commit evidence atomicity) — the load-bearing input
      for the detection + re-author path in this agent's workflow.
  - path: stories/<id>.yml
    reason: |
      The story you are scaffolding. Read in full, including `guidance` —
      the guidance block often names the fixture shape or resilience
      claim a test scaffold must put into the panic message.
  - path: agents/assets/definitions/identifier-forms.yml
    reason: |
      Canonical forms of run_id, story_id, and commit (and the signer
      string downstream rows reference). Evidence rows you write must
      match these forms verbatim — UUID v4 for run_id, integer for
      story_id, 40-char lowercase hex for commit. Drift here invalidates
      the handshake with build-rust and `agentic-verify`.
  - path: agents/assets/principles/deep-modules.yml
    reason: |
      The deep-modules principle this agent applies to scaffold
      authorship. Read every session; the `prefer-shared-scaffold`
      rule (process.yml `guidance.rules`) is its operational
      application — preferring shared fixture primitives over
      hand-rolled per-file helpers, with the assertion ban as the
      reward-hacking guardrail.
  - path: crates/agentic-test-support/README.md
    reason: |
      Catalogue of shared fixture primitives (extracted in story 26).
      If this file does not yet exist, the kit has not yet been built
      and all scaffolds are bespoke; the rule activates as soon as the
      file exists. Until then, treat the missing-file case as "no
      primitives available" and proceed with bespoke scaffolds, noting
      in the run summary that the kit was not yet present.

context:
  - pattern: patterns/*.yml
    reason: |
      Read every pattern named in the story's `patterns:` field in full.
      Patterns sometimes dictate where the test lives (e.g. the
      `standalone-resilient-library` pattern implies a test file that
      drives the library directly rather than through a CLI).
  - pattern: crates/*/README.md
    reason: |
      Each crate's README states its purpose, boundaries, and preferred
      test style. Match the crate's conventions when placing a scaffold
      in its `tests/` directory.
  - pattern: crates/*/Cargo.toml
    reason: |
      Existing dev-dependency choices. Do not add a dev-dependency
      unilaterally — escalate if the scaffold demands one not already
      declared.
  - pattern: evidence/runs/*/*-red.jsonl
    reason: |
      Prior red-state evidence files. Copy the row shape exactly; this
      is the handshake with build-rust and `agentic-verify`.

parameters:
  - name: story_id
    description: |
      Integer id of the story to scaffold. The agent reads
      stories/<id>.yml, iterates acceptance.tests[], and produces one
      failing test file per missing entry plus one red-state evidence
      file recording the run.

tools:
  - Read
  - Glob
  - Grep
  - Write
  - Edit
  - Bash

commands:
  - name: cargo-check-workspace
    invocation_example: cargo check --workspace --tests
    purpose: |
      Probe each Rust scaffold's red state. A non-zero exit with a rustc
      error attributable to a symbol the scaffold references is the
      compile-red path — capture the first error line as the diagnostic
      and proceed to evidence. A clean check means the scaffold must be
      runtime-red; fall through to `cargo test` per scaffold.
  - name: cargo-test-single
    invocation_example: cargo test --package <crate> --test <test_file> -- --nocapture
    purpose: |
      For runtime-red scaffolds (those that compile cleanly), run one in
      isolation to confirm it fails, capturing its panic output for the
      evidence row's diagnostic field.
  - name: git-status-porcelain
    invocation_example: git status --porcelain
    purpose: |
      Detect a dirty working tree before running. Any non-empty output
      is a fail-closed condition — refuse to write scaffolds or evidence
      until the tree is clean.
  - name: git-rev-parse-head
    invocation_example: git rev-parse HEAD
    purpose: |
      Read the current commit hash to stamp into the red-state evidence
      row. Must be called on a clean tree (porcelain output empty).
  - name: git-log-story-since-evidence
    invocation_example: git log --format=%H <last-evidence-commit>..HEAD -- stories/<id>.yml
    purpose: |
      Detect whether the amendment carve-out applies to an existing test
      file (ADR-0005 amendment, per-commit evidence atomicity). Parse the
      `commit` field on the most recent `evidence/runs/<id>/*.jsonl`,
      then list commits to `stories/<id>.yml` since that commit. Non-empty
      output means the story contract has moved since the last red-state
      proof — the re-author path is eligible, provided the other two
      gates (status is `under_construction`; edit commits atomically with
      new evidence) also pass. Empty output means preserve.
