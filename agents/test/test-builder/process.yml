workflow:
  session_start:
    - Read every file listed in inputs.yml `required_reading`.
    - Read every pattern named in the story's `patterns:` field.
    - Read the README of every crate whose `tests/` directory this story writes into.
    - Run `git status --porcelain` once. Non-empty output is a fail-closed condition for the whole session — report and stop.
    - See agents/assets/definitions/session-start-memory.yml.

  steps:
    - step: Confirm scope.
      detail: |
        Re-read the story's outcome, acceptance.tests, and guidance. Confirm
        the story id with the caller if there is any ambiguity — a test
        scaffold written against the wrong story is a 1-to-1 binding
        violation and must not happen.

    - step: Classify every acceptance.tests[] entry.
      detail: |
        For each entry, decide exactly one of three outcomes and record it
        for the summary:
          - EXISTING: file exists on disk with non-empty content. Preserve
            it — do not open, do not edit. Record the path under "preserved."
          - REJECT: justification is thin (empty-after-trim, a single token,
            or matches `/^\s*(TODO|TBD|\.\.\.)\s*$/i`). Stop the session,
            escalate to story-writer with the offending test's index and
            justification text. Do not write any scaffolds for the story.
          - SCAFFOLD: file is missing or empty, and the justification is
            substantive. Proceed to the write step.

    - step: Write the scaffolds.
      detail: |
        For each SCAFFOLD entry, create the file. For a `crates/*/tests/*.rs`
        path, write a Rust integration test whose single `#[test]` function
        is named from a snake_case reduction of the first sentence of the
        justification, and whose body is:
            panic!("red: {first-line-of-justification}");
        preceded by any setup comments inferred from the justification. The
        scaffold must compile — prefer `panic!(..)` over `unimplemented!()`
        so the failure is reportable and deliberate, not an accident of
        missing trait bounds. For a `scripts/verify/*.sh` path, write a
        POSIX-sh file that prints the justification's first line to stderr
        and exits 1.
        Never add a `#[ignore]` attribute. Never add `assert!(true)`. A
        scaffold that passes is a defect.

    - step: Prove compilation.
      detail: |
        Run `cargo check --workspace --tests`. If it fails, the shape of
        the scaffold is wrong — the crate's `tests/` directory may need a
        different module layout, or a dev-dependency is genuinely missing.
        If missing dev-dependency, STOP and escalate (you may not add it).
        Otherwise fix the scaffold shape and re-check. Do not proceed to
        evidence until `cargo check` is clean.

    - step: Prove red state.
      detail: |
        For each freshly written Rust scaffold, run
        `cargo test --package <crate> --test <test> -- --nocapture`. Confirm
        each one fails. Capture the first line of the panic message as the
        scaffold's diagnostic. For each shell scaffold, run `bash <path>`
        and confirm non-zero exit plus the expected stderr line.
        A scaffold that passes is a defect — stop and diagnose; do not
        record evidence for a green scaffold.

    - step: Record red-state evidence.
      detail: |
        Re-run `git status --porcelain`. It must still be empty (you have
        only created files listed in owns; they are now staged by the act
        of writing — the clean-tree check here is against OTHER paths).
        Read HEAD with `git rev-parse HEAD`. Write one JSON line to
        `evidence/runs/<story-id>/<UTC-ISO-8601>-red.jsonl` with shape:
            {"run_id": "<uuid-v4>",
             "story_id": <id>,
             "commit": "<hex>",
             "timestamp": "<iso-8601>",
             "verdicts": [
               {"file": "<path>", "verdict": "red", "diagnostic": "<first-panic-line>"},
               ...
             ]}
        The file name is new per run; do not overwrite a prior red-state
        artefact. Preserved entries appear in the verdicts array with
        `"verdict": "preserved"` and no diagnostic.

    - step: Stop.
      detail: |
        Do NOT run `cargo test --workspace` on the full suite — that is
        build-rust's baseline concern. Do NOT implement anything. Do NOT
        flip the story's status. Hand back a summary naming each file's
        classification and the evidence path.

guidance:
  rules:
    - The first observable check of every session is `git status --porcelain`. Non-empty output is a fail-closed condition — the red-state record is only meaningful if it is a committable atomic, and a dirty tree forfeits that claim.
    - Read each file listed in required_reading every session. See agents/assets/definitions/session-start-memory.yml.
    - A scaffold that does not fail is a defect. Never suppress with `#[ignore]`, `#[cfg(..)]`, `assert!(true)`, or unreachable code guards.
    - Never edit an existing test file. An acceptance.tests[].file that already has content is preserved and reported — it is not your authority to re-redden what the implementer has already worked on.
    - Never write production source. `crates/*/src/**` is explicitly forbidden in contract.yml and that is the whole point of this agent — authoring tests without being able to make them pass.
    - Never add a dev-dependency. If a scaffold genuinely needs one, escalate. Do not edit `Cargo.toml` under any pretext.
    - A test's name and its panic message both derive from the acceptance.tests[].justification. The goal is that a failed test run reads the justification back to a human with no extra context — that is what makes red-state evidence self-describing.
    - "Preserved entries still appear in the red-state evidence file, with `verdict: preserved`. Build-rust and `agentic uat` need to see the full shape of the acceptance.tests[] array, not only the subset you wrote."
    - name: pre-adr-0005-scaffolds
      detail: |
        Stories that were `under_construction` before ADR-0005 was accepted
        may carry test files that build-rust (pre-v0.3.0) created. Treat
        them exactly like any other existing file: classify as PRESERVED,
        do not open for writing, do not re-scaffold. If such a file
        currently passes on a clean tree, that is a red-state-evidence
        defect — escalate to story-writer; the observable in the
        justification likely needs revising.

  anti_patterns:
    - Writing any file under `crates/*/src/**`. That crosses the red-green line and the whole contract collapses.
    - Adding `#[ignore]` or `#[cfg(all(test, never))]` to a scaffold "just to make cargo check quiet." The scaffold must fail when run; muting it is the legacy failure mode in a new skin.
    - Using `assert!(true)` or `#[test] fn _() {}` as a placeholder. A scaffold is not a placeholder — it is the red evidence.
    - Overwriting an existing test file because "mine is better." Existing content is preserved without inspection; improvements are a story-writer concern.
    - Deriving a test name from the file path instead of the justification. The justification is the contract; the path is a location.
    - Adding a dev-dependency to make a scaffold compile. Escalate instead; dev-dependency choices belong to build-rust or an ADR.
    - Skipping the `git status --porcelain` precheck. Red-state evidence on a dirty tree is forgeable and the whole artefact is then worthless.
    - Recording red-state evidence for a scaffold you did not actually run. Every verdict row corresponds to a real `cargo test` or `bash` invocation in this session.
    - Running `cargo test --workspace` to produce evidence. That is build-rust's baseline concern; you run each scaffold in isolation so per-test diagnostics are clean and attributable.
    - Writing the evidence file to a path other than `evidence/runs/<story-id>/<timestamp>-red.jsonl`. Downstream agents grep by that shape — deviating renames the handshake.

  escalation:
    - "Dirty working tree detected: STOP. Report the paths with pending changes and wait. Do not run any further steps."
    - "Justification is thin (empty, a single token, or a TODO/TBD marker): STOP. Surface the offending test's index, file, and justification text to story-writer. Do not write any scaffolds for this story — the contract is that story-writer authors substantive justifications before test-builder runs."
    - "A scaffold requires a dev-dependency not already in the crate's Cargo.toml: STOP. Report the crate, the proposed dep, and the scaffold demanding it. Do not add it yourself."
    - "`cargo check --workspace --tests` fails and the fix is not a scaffold-shape problem: STOP. Likely signals a crate-level issue that belongs to build-rust or a schema change."
    - "A scaffold you just wrote passes when run: STOP. Diagnose — the justification may name a guarantee the existing code already satisfies, in which case the story either needs revision or the scaffold's observable is wrong. Do not record evidence until the scaffold fails deliberately."
    - "An acceptance.tests[].file path falls outside `crates/*/tests/**` and `scripts/verify/**`: STOP. The path is outside this agent's authority. Surface to story-writer."
