required_reading:
  - path: CLAUDE.md
    reason: See assets/guidelines/reference-claude-md.yml.
  - path: schemas/story.schema.json
    reason: See assets/definitions/story-schema-contract.yml.
  - path: stories/<id>.yml
    reason: |
      The actual story you are implementing. Required input. Read in full,
      including the guidance block — that's where non-obvious technical
      constraints live.
  - path: docs/decisions/
    reason: |
      Architectural Decision Records. Read every ADR the story or its
      patterns reference. Especially ADR-0002 (store trait, no direct DB
      access) and ADR-0003 (subscription auth via local claude binary).
  - path: assets/definitions/identifier-forms.yml
    reason: |
      Canonical forms of run_id, signer, story_id, and commit. When you
      implement a producer or parser for any of these (stories 16, 18,
      19, 20, 23), match the forms verbatim. The underscore-vs-hyphen
      kind of drift in `sandbox:<model>@<run_id>` is the bug class this
      asset exists to prevent.
  - path: assets/principles/deep-modules.yml
    reason: |
      The deep-modules principle this agent applies to crate-level
      `pub` surfaces. Read every session; the operational application
      is named in process.yml `guidance.rules` — reach for richer
      fixture composition before widening a crate's `pub` surface
      "for testability."

context:
  - pattern: patterns/*.yml
    reason: |
      Read every pattern named in the story's `patterns:` field in full.
      Patterns describe shared design constraints; ignoring them leads to
      violating boundaries the story takes for granted.
  - pattern: crates/*/README.md
    reason: |
      Each crate's README is the source of truth for that crate's purpose,
      boundaries, allowed dependencies, and design rules.
  - pattern: crates/*/Cargo.toml
    reason: |
      Existing dependency choices and version constraints across the
      workspace. Match versions; do not introduce duplicates at different
      semver ranges.

parameters:
  - name: story_id
    description: |
      Integer id of the story to implement. The agent reads stories/<id>.yml,
      identifies the failing acceptance tests, and produces the minimum code
      change to turn them green.

tools:
  - Read
  - Glob
  - Grep
  - Write
  - Edit
  - Bash

commands:
  - name: cargo-test-workspace
    invocation_example: cargo test --workspace --no-fail-fast
    purpose: |
      Run the full test suite. `--no-fail-fast` so one regressed test does
      not hide other regressions. Run at session start (baseline) and after
      every code change.
  - name: cargo-fmt
    invocation_example: rustfmt crates/<pkg>/src/<file>.rs
    purpose: |
      Format specific `src/` files you edited. Never `cargo fmt --all` or
      `cargo fmt -p <pkg>` — both reach `tests/` and rewrite test-builder's
      scaffolds (ADR-0005). `<pkg>` and `<file>` are per-story placeholders;
      name the exact files you touched. Verify with `rustfmt --check` on the
      same files before claiming completion.
  - name: cargo-clippy
    invocation_example: cargo clippy --workspace --all-targets -- -D warnings
    purpose: |
      Run clippy with warnings-as-errors across all crates and targets.
      Required to pass before claiming completion.
  - name: cargo-build
    invocation_example: cargo build --workspace
    purpose: |
      Confirm the workspace compiles before running tests. Useful when a
      compilation error would otherwise be buried in test output.
  - name: cargo-test-single
    invocation_example: cargo test --package <crate> --test <test_file>
    purpose: |
      Run a single integration test in isolation while iterating. Always
      follow up with the full workspace run before claiming completion.
