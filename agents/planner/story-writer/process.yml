workflow:
  session_start:
    - Read every file listed in inputs.yml `required_reading`.
    - See assets/definitions/session-start-memory.yml.

  modes:
    directed:
      when: A user has an objective for which a story or pattern should exist, be updated, or be consulted.
      steps:
        - step: Understand the objective.
          detail: Ask 1–2 tight clarifying questions if scope or intent is unclear. Do not guess.
        - step: Search.
          detail: |
            For story work: run `scripts/agentic-search.sh --quiet <terms>`. Try
            multiple term combinations if the first returns nothing. Document in
            your summary what you ran and what it returned.
            For pattern work: glob patterns/*.yml and grep for relevant concepts.
        - step: Scan for applicable patterns.
          detail: |
            Before writing any substantive guidance in a story, scan patterns/ for
            applicable patterns. Reference them in the story's `patterns:` field.
            Do not restate pattern content in guidance.
        - step: Draft the UAT walkthrough first.
          detail: |
            Before finalising outcome, tests, or guidance, draft `acceptance.uat`
            as a coherent doc-blind prose journey. This is the sizing test. If you
            cannot write a coherent walkthrough — the prose feels thin, requires
            unbuilt pieces, or jumps between distinct starting contexts — the
            story is wrong-sized. Merge into a neighbour or split out a clearly-
            separable prerequisite until the UAT is coherent. See
            `guidance.rules.uat-first-fence`.
        - step: Triage.
          detail: |
            - Exact match: tell the user. No action.
            - Partial match, refinable: edit the existing artifact.
            - Overlap across 2+ artifacts: propose merge or split. Execute only
              after the user confirms.
            - No match: apply the splitting rule (in guidance). If single-story,
              draft new. If multi-story, propose the split first.
        - step: Author or edit.
          detail: |
            Follow the authoring guide field-by-field. For stories: outcome must
            be conjunction-free, tests get per-test justifications, patterns
            referenced not restated. For patterns: extraction only when 2+
            stories would share the concept.
        - step: Validate.
          detail: |
            Against schema (required fields non-empty, correct types). Against
            anti-patterns. Against splitting rule. Confirm every referenced
            pattern exists.

            Cross-corpus invariants — run on EVERY write or amend, not just
            when a reviewer asks. Each has a named rule under `guidance.rules`:
              1. Test-file 1-to-1 binding: every `acceptance.tests[].file`
                 value appears in exactly one story across `stories/*.yml`.
                 See `test-file-one-to-one`.
              2. Test-file path shape: every `acceptance.tests[].file` matches
                 `crates/<crate>/tests/<name>.rs` OR `scripts/verify/<name>.sh`.
                 No YAML, markdown, or other shape. See `test-file-path-shape`.
              3. `depends_on` DAG acyclicity: after the edit, the graph formed
                 by all `depends_on` edges across the corpus is acyclic.
                 See `depends-on-acyclic`.
              4. `patterns` / guidance coherence: a pattern listed in
                 `patterns:` must not be explicitly carved out as
                 non-applicable in the story's own `guidance`, and
                 vice-versa. See `patterns-guidance-coherence`.

            Any failure here stops the write. Fix the story, then re-validate.
        - step: Write or edit the file(s). Stop.
          detail: Do not run tests, modify code, or touch anything outside stories/ and patterns/.

    audit:
      when: Proactive consistency pass over stories, patterns, or both.
      steps:
        - step: Scope.
          detail: See assets/definitions/audit-mode-protocol.yml.
        - step: Scan.
          detail: |
            Look for:
            - Duplication: near-duplicate stories or patterns covering the same outcome/concept.
            - Terminology drift: same concept named differently across artifacts.
            - Gaps: a concept referenced but not defined (broken pattern reference; missing story).
            - Orphan tests: test files not referenced by any story's acceptance.tests.
            - Orphan patterns: patterns not referenced by any story.
            - Stale proof: healthy stories whose content diverges from evidence.
            - Guidance restating a pattern: extract to pattern.
            - Guidance restating another story: merge or dedupe.
            - Test-file duplication across stories: any `acceptance.tests[].file`
              value that appears in 2+ stories. See `test-file-one-to-one`.
            - Test-file path-shape violations: any `acceptance.tests[].file`
              not matching `crates/<crate>/tests/*.rs` or `scripts/verify/*.sh`.
              See `test-file-path-shape`.
            - `depends_on` cycles: build the directed graph from every story's
              `depends_on` edges and run a DFS; any cycle is a corpus-level
              defect. See `depends-on-acyclic`.
            - Pattern / guidance contradictions: for every story whose
              `patterns:` names a pattern X, grep its `guidance` for language
              that carves X out ("does not apply", "not X-shaped", "not a X");
              and conversely, a guidance carve-out whose pattern appears in
              `patterns:`. See `patterns-guidance-coherence`.
        - step: Produce a plan.
          detail: See assets/definitions/audit-mode-protocol.yml.
        - step: Confirm with user.
          detail: See assets/definitions/audit-mode-protocol.yml.
        - step: Execute.
          detail: See assets/definitions/audit-mode-protocol.yml.
        - step: Summarize.
          detail: See assets/definitions/audit-mode-protocol.yml.

guidance:
  rules:
    - Read schemas and authoring guides at session start. Every session.
    - First action in directed mode (story work) is `scripts/agentic-search.sh`. A write without a documented search is a failure.
    - See assets/guidelines/edit-first-curation.yml.
    - Reference patterns instead of restating them. Scan patterns/ before writing guidance.
    - Extract to pattern when guidance repeats across 2+ stories. Update referring stories in the same pass.
    - "All schema rules apply. Required fields non-empty. `status: proposed` on new stories. Use the next free integer ID for stories."
    - "`depends_on` is `[]` unless a real hard blocker exists."
    - "`patterns` is `[]` by default; add only patterns that actually apply."
    - Editing a healthy story is legal and auto-reverts status. Do not tiptoe to preserve proof. The system is designed to re-verify.
    - name: journey-principle
      detail: |
        Each story should encompass a COMPLETE USER JOURNEY toward a single
        objective. If completing story A naturally leads the user to need
        story B, they are the SAME journey and belong in ONE story.

        This is the primary scoping rule. The splitting-rule below refines
        HOW to split when a journey genuinely contains two; the journey
        principle decides WHETHER to split at all. Default: do not split.

        Source: legacy/AgenticEngineering/modules/AgenticGuidance/agents/build/build-story-writer/process.yml:271-275.
    - name: story-first-not-boundary-first
      detail: |
        Story discovery precedes crate, module, or component-boundary
        decisions. Do not carve stories along crate lines (one story per
        crate) or along internal module seams. A story is a user journey;
        whether it spans one crate or five is an implementation detail the
        story must not encode.

        Diagnostic: if the only thing distinguishing two candidate stories
        is which crate implements which half, they are one story.

        Paraphrased from legacy/AgenticEngineering/modules/AgenticGuidance/assets/guidelines/planning-standard.yml:17-38
        ("Story discovery MUST occur BEFORE phase determination in any
        planning workflow").
    - name: consolidate-over-fragment
      detail: |
        When two candidate or existing stories share a CLI surface or a
        common user-action pattern, they consolidate by default. Splitting
        requires explicit justification against the splitting-rule — not
        the other way around.

        Diagnostic question (legacy source): "Could this epic have been
        avoided if the prior story was accurate enough?" If yes, the
        existing story has a gap; the action is UPDATE, not NEW.

        Operational grounding: see
        `assets/principles/deep-modules.yml`
        (`application_to_story_authoring`). The asset adds the deletion
        test as a tie-breaker — when on the fence about splitting vs
        consolidating, imagine retiring the candidate via
        `superseded_by`; if the corpus's coverage of the underlying
        capability is unchanged (UAT walkthroughs, build-rust runs,
        dashboard queries see no gap), the candidate was shallow and
        consolidation is correct. Do not duplicate the asset's content
        here; reference it.

        Source: legacy/AgenticEngineering/modules/AgenticGuidance/agents/build/build-story-writer/process.yml:186-189
        and legacy/AgenticEngineering/docs/userstories/Planning/10_feedback_recovery.yml
        ("Two stories validating the same CLI surface is the fragmentation
        anti-pattern the journey principle warns against").
    - name: defects-amend-the-owning-story
      detail: |
        Defects go back into the owning story, not a new story. When a
        defect is found in a healthy story's implementation — an
        observable that its acceptance tests don't yet pin — the fix is
        to AMEND that story: add a new `acceptance.tests[]` entry whose
        justification names the defect's correct behaviour, flip
        `status` to `under_construction`, let test-builder scaffold the
        new test red, let build-rust fix the impl, re-UAT. Do NOT draft
        a separate story to "fix story X." Each story owns its domain;
        defects in the impl are gaps in its coverage, not a new concern.

        Amending a healthy story auto-reverts it to `under_construction`
        per the lifecycle — that is by design. The system is asking for
        a re-UAT because the contract shape changed. See also the
        `editing a healthy story is legal and auto-reverts status` rule
        above.

        First reflex on "story X has a bug": ask "what acceptance.tests
        entry of story X is missing that would have caught this?" — not
        "draft new story Y."

        Exception: if the defect reveals a NEW contract shape (new API
        surface, new CLI subcommand, new observable beyond the owning
        story's outcome), a new story may be appropriate. "The
        observable exists but is wrongly implemented" = amend. "A new
        observable is required" = judgment call, surface to the user.

        Rationale: without this rule, the corpus fragments. Every bug
        becomes a new story; every story depends on N prior stories
        that patch each other; the DAG turns into a briar patch. With
        it, each story stays the single owner of its domain and
        defect-history lives inside the story that owns the behaviour.
    - name: test-file-one-to-one
      detail: |
        Every `acceptance.tests[].file` value must appear in exactly ONE
        story across `stories/*.yml`. Before writing or amending any
        story's `acceptance.tests[]`, enumerate all `file:` values across
        the current corpus (glob `stories/*.yml`, grep `file:`) and refuse
        to introduce a file that already exists in another story.

        Why: the schema and `stories/README.md` both pin 1-to-1 binding.
        A shared test file means two stories compete for ownership of
        the same red->green evidence — test-builder cannot scaffold it
        without collision, and `agentic uat` cannot attribute the result
        to a single story.

        Prior failure: Phase 0 batch wrote
        `snapshot_for_story_returns_ancestor_closure.rs` into both
        story 4 and story 20, and the three `load_*_retired_*` tests
        into both story 6 and story 21.
    - name: test-file-path-shape
      detail: |
        Every `acceptance.tests[].file` must match one of:
          - `crates/<crate>/tests/<name>.rs`
          - `scripts/verify/<name>.sh`

        YAML files, markdown, fixtures, data files, and any other path
        shape are rejected. `stories/README.md` pins these two locations
        as canonical; test-builder has no way to author a scaffold for
        anything else, and `agentic story audit` has no way to verify a
        fixture the way it verifies a test run.

        If a story needs to pin a data-migration artefact or a fixture,
        the story's acceptance test is a `scripts/verify/<name>.sh` or a
        `crates/<crate>/tests/<name>.rs` that LOADS the fixture and
        asserts its shape — not the fixture path itself.

        Prior failure: Phase 0's story 21 listed `stories/7.yml`,
        `stories/8.yml`, `stories/14.yml` as acceptance tests for its
        retirement-backfill contract. Those are fixture YAMLs, not tests.
    - name: depends-on-acyclic
      detail: |
        After every proposed edit to any story's `depends_on`, the
        directed graph formed by all `depends_on` edges in the current
        corpus must be acyclic. Run a DFS (or equivalent) across
        `stories/*.yml` before committing the edit. Reject cycles.

        Story 6 itself pins
        `load_cycle_in_depends_on_is_rejected.rs` as an acceptance test
        — the loader refuses to load a corpus containing a cycle. An
        edit that adds a cycle is an edit that makes the corpus
        unloadable once story 6's contract ships.

        Amendment sequencing — eventual consistency. When an amendment
        is authored because an upstream story's contract shifted, the
        amendment's test set and guidance capture the new contract; the
        amendment's `depends_on` stays AS-IT-WAS. Amended stories do
        NOT declare `depends_on` on their triggering new story — both
        sides sit red until the pipeline converges. Back-edges encode
        a strict ordering that contradicts the eventual-consistency
        posture established in
        `docs/research/story_tree/13-existing-stories-impact.md`
        (section "Amendment sequencing — eventual consistency").

        Prior failure: Phase 0 amendments added back-edges
        (story 1 -> 18, story 4 -> 20, story 6 -> 17 + 21, ...)
        producing a 14-node strongly-connected component.
    - name: patterns-guidance-coherence
      detail: |
        If a story's `patterns:` list includes pattern X, the story's
        `guidance` must NOT say "this story does not apply pattern X"
        or equivalent carve-out. Conversely, if the guidance takes the
        time to explain a named pattern is inapplicable, that pattern's
        ID must NOT appear in `patterns:`.

        Before committing a story with a `patterns:` field, read each
        referenced pattern's own `when_to_use` (in `patterns/<id>.yml`)
        AND search the story's own guidance for language that
        explicitly carves out non-application of that pattern ("does
        not apply", "not X-shaped", "is not a X story", "unlike X").
        If the guidance says "does not apply" for a pattern the field
        claims, refuse the write.

        Prior failure: Phase 0's story 20 declared
        `patterns: [standalone-resilient-library]` while its own
        guidance (around lines 488–495) said the crate is NOT
        standalone-resilient-library-shaped because it's orchestration.
        A self-contradiction a close read catches but a field-filling
        pass does not.
    - name: uat-first-fence
      detail: |
        Before finalising any story, draft its `acceptance.uat` FIRST. If
        you cannot write a coherent doc-blind journey for it, the story is
        the wrong size — split or merge until the uat_plan is coherent.

        The UAT prose is the sizing test, not the last field you fill in.
        A thin, nonsensical, or unbuilt-piece-dependent walkthrough is
        the signal to resize the story, not to thicken the prose.

        Source: legacy/AgenticEngineering/modules/AgenticGuidance/assets/specifications/story-schema.yml:200-209.
    - name: contract-not-checklist
      detail: |
        The story describes the COMPONENT'S CONTRACT, not the diff.
        Acceptance tests name invariants (observable behaviours the
        component must uphold), not implementation steps. Guidance names
        behaviour to preserve or patterns to follow, not refactor tasks
        or PR-level to-dos.

        Diagnostic: if a test title or guidance line reads like a commit
        message or a ticket, it's a checklist entry and does not belong.

        Source: legacy/AgenticEngineering/modules/AgenticGuidance/agents/build/build-story-writer/process.yml:203-205
        ("do NOT translate the epic's tickets into a step-by-step checklist
        on the story").
    - name: splitting-rule
      detail: |
        Split a story when EITHER is true:
          (a) Its outcome cannot be stated in one sentence without conjunctions
              (and, also, as well as, comma-joined clauses that describe distinct outcomes).
          (b) Its acceptance tests do not share a common precondition and a common observable.

        Tiebreakers. If neither primary rule clearly applies, split if 2+ of these hold:
          - UAT has distinct starting contexts.
          - Guidance reads as two separate rebuild briefs with minimal shared vocabulary.
          - Story mixes a spike (research/learning) with delivery.
          - Any element contradicts another when read in isolation.

        Non-rule: length is NOT a splitting criterion. A long story with one
        coherent outcome, one shared fixture, and one rebuild brief stays as
        one story.
    - name: personas-require-real-populations
      detail: |
        Distinct starting contexts and distinct user personas are only valid
        splitting tiebreakers when they correspond to DISTINCT REAL USER
        POPULATIONS — people (or programs) who would in practice only ever
        exercise one side of the split. Role labels like "library author",
        "operator", "CI system", "consumer", or "reviewer" are insufficient
        on their own: if the same real person wears all those hats in the
        same session, they are one user and their journey is one journey.

        Test: can you name a concrete user or system that would touch story
        A and never story B (and vice versa) under realistic usage? If not,
        the distinction is a label, not a split.

        Interlock with journey-principle and splitting-rule:
          - journey-principle decides IF to split (default: do not).
          - splitting-rule's tiebreakers (distinct starting contexts, two
            rebuild briefs, spike+delivery, internal contradiction) decide
            WHEN the contexts count.
          - this rule guards those tiebreakers against label-only
            distinctions: a "distinct starting context" dressed in a role
            label but exercised by the same real person is not distinct.

        Diagnostic: if the only thing separating the two candidate stories
        is the hat the user is wearing (author vs operator, producer vs
        consumer, builder vs reviewer) and the same human wears both hats
        in the same workflow, consolidate.

  anti_patterns:
    - Outcome describes implementation rather than user-observable value.
    - Outcome uses conjunctions (and / also / as well as) — split the story instead.
    - Splitting stories along crate, module, or component boundaries instead of along user journeys.
    - "Splitting stories based on role labels (\"library author\", \"operator\", \"consumer\", \"reviewer\") when the same real person exercises all roles in the same workflow."
    - "Two stories covering the same CLI surface or user-action pattern without explicit splitting-rule justification — this is the fragmentation anti-pattern the journey principle warns against."
    - "Drafting a new story to fix a defect in an existing healthy story's implementation — defects amend the owning story (new acceptance.tests entry, status flip to under_construction, re-UAT). See `defects-amend-the-owning-story`."
    - Finalising a story before its `acceptance.uat` prose is coherent — the UAT walkthrough is the sizing test, not a field to backfill.
    - Thickening a thin UAT walkthrough with prose instead of resizing the story that produced it.
    - Acceptance tests phrased as implementation steps rather than invariants.
    - Guidance phrased as a refactor task list or PR checklist rather than behaviour to preserve.
    - Guidance restates a pattern that exists in patterns/.
    - Guidance restates another story's guidance.
    - Near-duplicate story or pattern creation (search step failed or was skipped).
    - "Writing `acceptance.tests[].file` values without enumerating existing `file:` values across the corpus first — the failure mode behind duplicated test files (see `test-file-one-to-one`) and fixture-paths-as-tests (see `test-file-path-shape`)."
    - "Adding a `depends_on` back-edge from an amended story onto the new story that triggered its amendment. The amendment captures the new contract; the edge stays as-it-was. See `depends-on-acyclic` and the eventual-consistency posture in docs/research/story_tree/13-existing-stories-impact.md."
    - "Filling `patterns:` from pattern titles alone without reading the pattern's `when_to_use` AND the story's own guidance for explicit non-application language. See `patterns-guidance-coherence`."
    - "Vague acceptance (\"the system works correctly\")."
    - Optimistic UAT without observable checks.
    - Single aggregate justification for multiple tests — each test gets its own.
    - Inventing schema fields not in the schema.
    - See assets/guidelines/no-proof-preservation.yml.
    - Patterns documenting generic literature rather than local convention.
    - Patterns extracted prematurely (from 0 or 1 stories).

  escalation:
    - "Schema validation fails: fix before writing. Never ship broken."
    - "User requests non-story / non-pattern work: redirect. \"That belongs under a story. Which story should own it?\""
    - "Duplicate or conflict with existing story/pattern: surface before writing."
    - "Request doesn't fit as a single story per the splitting rule: propose the split."
    - "User asks for a feature the schema doesn't support: surface as a schema change proposal; do not unilaterally invent fields."
