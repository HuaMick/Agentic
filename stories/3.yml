id: 3
title: Render the four-status story-health dashboard
outcome: |
  A developer runs `agentic stories health` and sees a single table
  showing every story's current health so unhealthy stories cannot hide
  behind unrelated work.
status: under_construction
patterns: []
acceptance:
  tests:
  - file: crates/agentic-dashboard/tests/health_proposed.rs
    justification: |
      Proves the proposed-classification rule: a story whose YAML
      has `status: proposed` renders as `proposed` in the table
      regardless of whether any `test_runs` or `uat_signings` rows
      exist for it. Without this, recording a test result for a
      story we haven't started would inadvertently promote it past
      the proposed gate.
  - file: crates/agentic-dashboard/tests/health_under_construction.rs
    justification: |
      Proves the under-construction rule: a story whose YAML has
      `status: under_construction` AND has never had a
      `uat_signings.verdict=pass` row renders as `under_construction`,
      whether `test_runs` is currently pass, fail, or absent.
      Without this, a never-passed story whose tests happen to be
      red would be misreported as "fell from grace" — but it never
      rose in the first place.
  - file: crates/agentic-dashboard/tests/health_healthy.rs
    justification: |
      Proves the healthy-classification rule: a story whose YAML
      has `status: healthy`, whose latest `uat_signings.verdict=pass`
      commit equals current HEAD, AND whose latest
      `test_runs.verdict=pass`, renders as `healthy` with a
      `Healthy at` cell showing the short SHA and a relative age
      ("3h ago"). Without this the only path to `healthy` (story 1)
      produces no observable signal in the dashboard.
  - file: crates/agentic-dashboard/tests/health_unhealthy_fell_from_grace.rs
    justification: |
      Proves the fell-from-grace rule under both triggers: (a) a
      story with a historical `uat_signings.verdict=pass` whose
      latest `test_runs.verdict=fail` renders as `unhealthy`, AND
      (b) a story with a historical UAT pass whose latest UAT
      commit no longer equals HEAD also renders as `unhealthy`.
      The `Failing tests` cell is populated from `test_runs.failing_tests`.
      Without this the whole point of the dashboard — surfacing
      was-healthy-now-broken — is missing.
  - file: crates/agentic-dashboard/tests/health_sort_and_truncation.rs
    justification: |
      Proves rendering correctness independent of classification:
      rows sort `unhealthy` → `under_construction` → `proposed` →
      `healthy`, titles longer than the truncation limit (~35
      chars) are truncated with an ellipsis, and the `Failing tests`
      cell is empty for `proposed` and `healthy` rows. Without this
      the most-important rows (unhealthy) can sink below noise and
      long titles can break terminal layouts.
  - file: crates/agentic-dashboard/tests/health_json_mode.rs
    justification: |
      Proves the `--json` contract at the library boundary: emits
      an object with `stories[]` and `summary{}` keys, includes
      commit fields in the canonical form documented in
      `assets/definitions/identifier-forms.yml` (not
      truncated), preserves the same data as the table mode, and
      is parseable by `serde_json` round-trip. Without this
      downstream tooling (CI status checks, future web UI) cannot
      consume the dashboard programmatically without scraping the
      TTY output.
  - file: crates/agentic-dashboard/tests/health_drilldown.rs
    justification: |
      Proves the single-story drill-down at the library boundary:
      `Dashboard::drilldown(<id>)` returns an expanded view
      including the list of currently failing test file basenames
      (when unhealthy) and the latest signing's commit and
      timestamp. Without this an operator sees `unhealthy` in the
      table but has no path from there to "which test, which
      commit?" without leaving the tool.
  - file: crates/agentic-dashboard/tests/health_malformed_yaml_renders_error_row.rs
    justification: |
      Proves the dashboard does not crash on bad input: given one
      story file that fails YAML parse or schema validation, the
      dashboard renders that story's row with health `error` and
      a short reason in the `Failing tests` cell, AND continues to
      render every other story correctly. Without this, a single
      malformed story file would blank the entire dashboard —
      making the worst case (we can't see what's broken) coincide
      with the moment we most need to see what's broken.
  - file: crates/agentic-cli/tests/health_json_mode.rs
    justification: |
      Proves the `--json` flag is plumbed through the binary:
      running `agentic stories health --json` against the same empty
      fixture emits stdout that `serde_json::from_str` parses into a
      value with `stories` (array) and `summary` (object) keys, and
      exits 0. Without this, JSON-mode consumers (future CI status
      checks, dashboards reading the binary's output) would have to
      discover via runtime failure whether the flag reached the
      `Dashboard::render_json` call at all.
  - file: crates/agentic-cli/tests/health_drilldown.rs
    justification: |
      Proves the positional `<id>` argument selects drilldown mode
      through the binary: `agentic stories health <id>` against a
      fixture story emits a single-story view (not the table
      header) and exits 0; running against an id that does not
      exist on disk exits non-zero with a message naming the
      missing id. Without this, the only way to access
      `Dashboard::drilldown` is via Rust, defeating the purpose of
      the subcommand for an operator.
  - file: crates/agentic-dashboard/tests/frontier_view_hides_retired.rs
    justification: |
      Proves the default (frontier) lens excludes retired stories:
      given a fixture corpus containing at least one story with
      `status: retired` and one with `status: healthy`, invoking
      `agentic stories health` with no mode flag renders a table
      whose rows contain no entry for the retired story, and whose
      summary counts at the foot exclude retired from their
      denominators (retired is neither healthy nor unhealthy — it
      is off-tree). Without this, the dashboard's frontier
      discipline degrades as the corpus accumulates retired eras:
      the default view becomes cluttered with stories that have
      been explicitly pruned, defeating the lens's purpose and
      undoing the frontier filter story 10 established for the
      non-retirement statuses.

      Story 10 cross-reference (2026-04-30 amendment). This test was
      authored before story 21's retired-handling landed and the
      filter_frontier inversion at commit 42e5d5a was discovered. Its
      original fixture (retired + healthy-only) was paired with
      assertions that the healthy stories render in the frontier — a
      contract incompatible with story 10's healthy-exclusion rule. The
      re-authored test must include a non-healthy story in the fixture so
      the frontier has rows to render: the test then asserts (a) the
      non-healthy story renders, (b) the retired story does not, (c) the
      healthy stories do not, and (d) the summary denominator excludes
      retired (no claim about whether summary counts the rendered subset
      or the whole non-retired corpus — the original justification did
      not require either, so the test asserts what the production code
      emits today). The retired-exclusion contract this test pins is
      unchanged; the new non-healthy fixture row is the minimal change
      that lets the test exercise the contract without colliding with
      story 10's invariant.
  - file: crates/agentic-dashboard/tests/canopy_view_shows_retired_with_era_grouping.rs
    justification: |
      Proves the canopy lens surfaces retired stories grouped by
      supersession chain with the era head as the grouping key:
      given a fixture corpus where `A` is
      `retired (superseded_by: B)`, `B` is
      `retired (superseded_by: C)`, and `C` is `healthy` (i.e.
      `C` is the era head because no story supersedes it),
      invoking `agentic stories health --canopy` (equivalently
      `--all-eras`) renders rows including A, B, and C clustered
      together under C as the era head, with A and B ordered as
      prior eras whose chain resolves through to C. A retired
      story with no `superseded_by` renders as a single-member
      terminal group (itself the era head). Without this, the
      canopy promise — "honest history of the tree's prior eras"
      — is a prose claim with no observable, and retired stories
      would appear as an un-grouped flat list indistinguishable
      from a broken frontier filter.
  - file: crates/agentic-dashboard/tests/json_mode_emits_era_head_id_per_story.rs
    justification: |
      Proves the JSON-mode grouping contract at the library
      boundary: `agentic stories health --canopy --json` (and,
      for symmetry, the default `--json` over a corpus containing
      retired stories even though they are filtered from frontier
      output) emits a `stories[]` array where each row object
      carries an `era_head_id` field pointing at the terminal
      successor of that story's supersession chain (the story
      itself when it is already terminal, whether healthy or
      retired-with-no-successor). Downstream tooling can therefore
      reconstruct era grouping via `group_by(.era_head_id)`
      without re-walking the `superseded_by` chain itself.
      Without this, consumers of JSON mode (CI status checks,
      future web UI) must re-implement the chain-walk against
      the same `superseded_by` pointers the dashboard already
      resolved — a duplication that would drift the moment the
      chain-walk algorithm evolves.

      Story 10 cross-reference (2026-04-30 amendment). The original
      fixture relied on healthy stories appearing in the frontier
      `stories[]` array so the era_head_id assertion had rows to land
      on. After the filter_frontier fix (story 10's healthy-exclusion
      invariant restored), healthy stories no longer render in the
      frontier; the re-authored test must seed a non-healthy story in
      the fixture so the frontier `stories[]` carries the era_head_id
      field on at least one row, and the canopy lens (which renders
      healthy + retired together with era_head_id) carries it on every
      row. The era_head_id contract this test pins is unchanged.
  - file: crates/agentic-cli/tests/health_exits_non_zero_on_error_or_unhealthy.rs
    justification: |
      Proves the exit-code-as-gate contract at the binary
      boundary: `agentic stories health --all` against a fixture
      corpus containing at least one row whose computed health is
      `error` (e.g. a story whose YAML says `status: healthy` but
      whose store carries no `uat_signings.verdict=pass` row —
      the status-evidence-mismatch shape) exits non-zero (exit
      code 2 — could-not-attest, mirroring the
      fail-closed-on-dirty-tree pattern's mapping); the same
      command against a fixture where at least one row computes
      to `unhealthy` (fell-from-grace) also exits non-zero;
      against a corpus where every row is `healthy`, `proposed`,
      or `under_construction` the command exits 0; and across
      every case the rendered output (table OR `--json`)
      contains the same row data the existing health tests pin —
      the exit code is purely additive to the rendered payload.
      Without this test the dashboard's detection of forged
      promotions and fell-from-grace stories remains a silent
      observation: the rendering shows `error` / `unhealthy` to
      a human reader, but a pre-commit hook (story 29) wrapping
      the command sees only exit 0 and would have to scrape the
      payload to learn the corpus is broken. The exit code is
      what makes this command an enforceable gate rather than a
      cosmetic inspector — it is the structural complement to
      the prove-it gate, denying any commit whose post-commit
      state would render as `error` or `unhealthy`. The mapping
      to exit 2 (not exit 1) is deliberate: exit 1 is reserved
      for "real failure of the operation itself" and the audit
      surface (story 25) reuses the same convention; exit 2
      means "the command ran successfully and detected a
      condition the operator must address before retrying," the
      same semantic the UAT gate's dirty-tree refusal already
      uses.
  uat: |
    Goal: convince yourself the dashboard correctly classifies the four
    statuses, surfaces `unhealthy` first, drills down on a specific
    story, refuses to crash when one story file is malformed, and that
    the `agentic stories health` subcommand reads the same store the
    `agentic uat` subcommand writes to.

    Setup:
      1. From a clean checkout on branch `main`, run `git status` and
         confirm the working tree is clean.
      2. Install the binary: `cargo install --path crates/agentic-cli
         --locked`. Confirm `command -v agentic` resolves to the just-
         installed binary.
      3. Confirm at least four stories exist on disk so the table has
         visible variety. If fewer exist, this UAT can still run but
         only some classifications will be observable; note in the
         report which were exercised.
      4. Choose a store location: `export AGENTIC_STORE=$(mktemp -d)`.
         Confirm the directory is empty.

    Four-status walkthrough:
      5. Set up four stories such that one matches each classification:
         - `<proposed-id>`: leave `status: proposed` on disk; do not
           record any test runs or signings.
         - `<uc-id>`: edit `status: under_construction` on disk; record
           a Pass `test_runs` row for it via story 2's recorder.
         - `<healthy-id>`: drive it through `agentic uat <healthy-id>
           --verdict pass --store "$AGENTIC_STORE"` (see story 1) so
           `status: healthy` is on disk and a `uat_signings.verdict=pass`
           row exists at HEAD; also record a Pass `test_runs` row.
         - `<unhealthy-id>`: drive it through `agentic uat <unhealthy-id>
           --verdict pass --store "$AGENTIC_STORE"` on commit `C1`,
           then make a code change and commit as `C2`, then break one
           of its acceptance tests and record a Fail `test_runs` row at
           `C2`. (You may also exercise the second trigger — UAT commit
           != HEAD without test failure — by making a no-op commit
           instead of breaking a test.)
      6. Run `agentic stories health --store "$AGENTIC_STORE"`. Observe:
         - Process exits 0.
         - Output is a single table with a header row matching:
           `ID | Title | Health | Failing tests | Healthy at`.
         - Row order: `<unhealthy-id>` first, then `<uc-id>`, then
           `<proposed-id>`, then `<healthy-id>`.
         - `<healthy-id>`'s `Healthy at` cell shows a 7-char SHA and
           a relative age string ("just now", "5m ago", etc.).
         - `<unhealthy-id>`'s `Failing tests` cell shows the broken
           test file's basename.
         - `<proposed-id>`'s and `<healthy-id>`'s `Failing tests`
           cells are empty.
         - Any title longer than the truncation limit appears
           truncated with an ellipsis; no row wraps onto two lines.

    Drill-down walkthrough:
      7. Run `agentic stories health <unhealthy-id> --store
         "$AGENTIC_STORE"`. Observe:
         - Output is an expanded single-story view, NOT the table.
         - It names every failing test file's basename.
         - It shows the latest UAT signing's commit (full or short
           is acceptable as long as it's unambiguous in this view)
           and timestamp.
      8. Run `agentic stories health 99999 --store "$AGENTIC_STORE"`
         (an id that does not exist). Observe:
         - Process exits non-zero.
         - stderr names the missing id.
         - No panic / backtrace is shown.

    JSON walkthrough:
      9. Run `agentic stories health --store "$AGENTIC_STORE" --json |
         jq .`. Observe:
         - Output parses as JSON.
         - Top-level keys include `stories` (array) and `summary`
           (object).
         - Commit fields are FULL SHAs (40 hex chars), not the
           truncated form shown in the table.
         - Counts under `summary` add up: number of `unhealthy` +
           `under_construction` + `proposed` + `healthy` (+ any
           `error` rows) equals the length of `stories`.

    Malformed-yaml walkthrough:
     10. Pick a story id `<bad-id>` that you do NOT mind temporarily
         corrupting (or copy a valid story to `stories/9999.yml`
         first to avoid risking real content). Edit it to be invalid
         YAML (e.g. unbalanced quotes) or invalid against the schema
         (e.g. `status: nonsense`). Save. Run `agentic stories
         health --store "$AGENTIC_STORE"`. Observe:
         - Process exits 0 (the dashboard does NOT crash on one bad
           file).
         - The `<bad-id>` row appears with `Health` = `error` and a
           short reason in the `Failing tests` cell ("yaml parse" or
           "schema: status").
         - Every OTHER story still renders correctly.

    Shared-store walkthrough:
     11. Confirm that `<healthy-id>` from step 5 still renders as
         `healthy` in both the table and `--json` output — i.e. the
         dashboard's store matches the one the UAT signing in step
         5 wrote to. If the dashboard does not see the row, the
         `--store` flag is not being honoured consistently across
         subcommands and this UAT fails.

    Cleanup:
     12. Revert the corrupted file from step 10 (`git checkout
         stories/<bad-id>.yml` or delete the throwaway `9999.yml`).
     13. Revert any `status: under_construction` / `status: healthy`
         edits you made for step 5 if you do not want to keep them.
     14. `rm -rf "$AGENTIC_STORE"` to clear the synthetic
         `test_runs` and `uat_signings` rows.
     15. If you want the installed binary gone from your toolchain:
         `cargo uninstall agentic-cli`.
guidance: |
  This story owns the read-side of the four-status model end-to-end:
  the classification rules and render logic in `agentic-dashboard`,
  the binary's argv-to-library wire in `agentic-cli`, and the cross-
  subcommand invariant that `agentic stories health` reads from the
  same store `agentic uat` writes to. The dashboard is a pure reader
  — it does not write to `test_runs` (story 2 owns that), it does
  not write to `uat_signings`, and it does not promote any story
  (story 1 owns that).

  Why no standalone-resilient-library pattern.
    The `standalone-resilient-library` pattern applies when "the
    system is in flames and we still need a verdict." The dashboard
    is the opposite: when the store is unreachable, the right
    behavior is to fail loudly with a clear error, not to produce a
    degraded reading that an operator might misinterpret. So the
    dashboard is allowed to depend on whatever it needs to render
    well.

  Health computation rules — the four cases.
    Compute per story by joining its YAML against the latest
    `test_runs` row (one per story) and the full `uat_signings`
    history for that story (append-only). The rules:

      - `proposed` ⇔ `story.status == proposed`. (No store lookup
        needed; the YAML wins.)

      - `under_construction` ⇔ `story.status == under_construction`
        AND no historical `uat_signings.verdict == pass` exists for
        this story_id. A story that has never been UAT-passed cannot
        "fall from grace"; it just hasn't risen yet.

      - `healthy` ⇔ latest `uat_signings.verdict == pass` for this
        story AND latest `test_runs.verdict == pass` AND the latest
        UAT signing's commit == current HEAD. Strict equality on the
        commit is intentional for now; a future story may relax this
        to "HEAD touches no related files" once stories declare
        `related_files`. Encode the strict rule today; the relaxation
        is a separate later story.

      - `unhealthy` ⇔ any historical `uat_signings.verdict == pass`
        exists for this story AND (latest `test_runs.verdict == fail`
        OR latest UAT commit != current HEAD). This is the
        "fell-from-grace" classifier. Note: a story missing from
        `test_runs` entirely but with a healthy UAT against current
        HEAD is `healthy` (test absence is not failure); a story
        missing both rows is `under_construction` if its YAML says
        so or `proposed` if its YAML says so.

    A row that doesn't fit any of the above (e.g. YAML says
    `healthy` but no UAT signing exists for it — which should be
    structurally impossible after story 1 lands but is possible
    today via hand-editing) renders as `error` with reason
    "status-evidence mismatch". This is the same `error` rendering
    used for malformed YAML.

  Table format.
    Columns in order: `ID | Title | Health | Failing tests | Healthy at`.
    Sort: `unhealthy` first, then `under_construction`, then
    `proposed`, then `healthy`. `error` rows sort to the very top
    (above unhealthy) because they signal we cannot trust the rest
    of the picture for that story. Within a status group, sort by
    ascending story id for stable output.

    `Title` truncates at ~35 visible chars with a single-character
    ellipsis (`…`), not three dots, to keep column widths tight on
    narrow terminals.

    `Failing tests` is a comma-separated list of test file basenames
    (matching the basenames written by story 2's recorder). Empty
    for `proposed` and `healthy` rows. For `under_construction`
    rows it shows the basenames if `test_runs.verdict == fail`,
    otherwise empty. For `error` rows it shows the short reason
    string.

    `Healthy at` shows `<short-sha> <relative-age>` (e.g.
    `a1b2c3d 3h ago`) only for `healthy` rows. Empty for all
    other classifications. Relative age uses the same formatter
    we'll standardize on across the CLI (rough buckets: just now,
    Nm ago, Nh ago, Nd ago); precision finer than minute is
    not useful here.

  `--json` contract.
    Top-level shape (`<commit>` takes the canonical form in
    `assets/definitions/identifier-forms.yml`):
      ```json
      {
        "stories": [
          { "id": 1, "title": "...", "health": "healthy",
            "failing_tests": [],
            "uat_commit": "<commit>",
            "uat_signed_at": "<rfc3339>",
            "test_run_commit": "<commit>",
            "test_run_at": "<rfc3339>" }
        ],
        "summary": {
          "healthy": 0, "unhealthy": 0,
          "under_construction": 0, "proposed": 0, "error": 0,
          "total": 0
        }
      }
      ```
    Null-able fields (uat_*, test_run_*) are emitted as JSON null
    when absent rather than omitted, so consumers don't have to
    distinguish "missing key" from "key with null value."

  Drill-down: `agentic stories health <id>`.
    When called with an id, the dashboard renders an expanded
    single-story view instead of the table. Includes: every field
    shown in the table for that story, the full commit SHA of the
    latest UAT signing, the full RFC3339 timestamp, the full list
    of failing test basenames (no truncation), and the relevant
    block of the story YAML's `outcome` field for context.
    Unknown id → exit non-zero with "no such story id" — distinct
    from "story exists but is in error state".

  Failure modes the dashboard tolerates.
    A single malformed story YAML must not crash the dashboard.
    Implementation: parse stories one at a time, catch parse and
    schema errors per file, render that story as an `error` row
    with the short reason in `Failing tests`, and continue. Never
    swallow the original error silently — when `--json` is set,
    the per-story object includes a `parse_error` field with the
    full message; in the table view it's truncated to fit.

    Failure modes the dashboard does NOT tolerate (it's allowed to
    fail loudly): the `agentic-store` is unreachable, the
    `stories/` directory does not exist, the user passed an
    unparseable flag. Exit non-zero with a clear message; the
    dashboard's job is to report the truth, and the truth is
    sometimes "I can't read the data."

  CLI shape — argv for `agentic stories health` (authoritative).
    agentic stories health [<id>] [--json] [--store <path>]

    Positional `<id>` is optional; when present it selects drilldown
    mode. `--json` selects JSON output instead of the table.
    `--store` is described in story 1's "Store location — default
    and override" section; this story inherits that behaviour
    verbatim. The cross-subcommand "UAT write visible to dashboard
    read on the same `--store`" round-trip observable is owned by
    story 10 (dag-primary-lens epic), not pinned here.

  Exit-code contract for `agentic stories health`.
    0 = rendered successfully AND every row classified as
        `proposed`, `under_construction`, or `healthy`. In other
        words, the corpus is in a state the prove-it gate
        already attests to. Malformed YAML still routes to an
        `error` row in the rendered output (this story's render-
        does-not-crash tolerance is intact), but the exit code
        now treats `error` rows as a gate failure — see below.
    2 = rendered successfully AND at least one row classified as
        `error` OR `unhealthy`. The render is correct (the
        operator sees the table and the offending rows) and the
        process exits non-zero so a wrapping pre-commit hook
        (story 29) can refuse the commit on detection. This is
        the gate-half of the dashboard: detection without
        enforcement is silent, so the same exit-code mapping the
        UAT gate uses for "could not attest" applies here for
        "the corpus is in a state the prove-it gate cannot
        attest to." `error` covers the status-evidence-mismatch
        shape — YAML says `healthy` but no `uat_signings`
        (or `manual_signings` per story 28) row backs it — which
        is the forged-promotion class story 29's hook exists to
        block. `unhealthy` covers the fell-from-grace shape
        story 3 already classifies. The amendment landed
        2026-04-29 alongside stories 25 (audit's parallel
        category) and 29 (the hook that consumes the exit
        code).
    Non-zero is also returned for the failure modes this story
    declines to tolerate (store unreachable, stories/ directory
    missing, unparseable flag) — those exit non-zero with a
    clear message; the rendered-output paths exit 0 or 2 per
    the rules above. In drilldown mode, an unknown `<id>` exits
    non-zero with a clear message (stderr names the missing
    id); `DashboardError::UnknownStory` carries the right shape.

    Why exit 2 and not exit 1. Exit 1 is reserved across the
    CLI for "real failure of the underlying operation" — a Fail
    UAT verdict (story 1), a real test red. Exit 2 is the
    "could-not-attest / retry after addressing the
    prerequisite" code, established by the
    fail-closed-on-dirty-tree pattern and reused by story 11's
    ancestor-refusal exit code. The dashboard's gate-half is
    semantically the same: the operator must address the
    `error` or `unhealthy` row before the commit can land; it
    is not "the dashboard itself failed." A pre-commit hook
    that ran into exit 1 would conflate `agentic stories health`
    with a Fail UAT verdict — the same CI distinction the
    dirty-tree mapping exists to preserve.

  CLI-wide decisions inherited from story 1.
    The parser choice, the full `agentic-cli` allowed-dependency
    list, the store-path default/override semantics, and the
    SurrealStore-not-MemStore decision are stated once in story 1's
    guidance. They apply to `agentic stories health` unchanged; do
    not restate them here.

  Test file locations.
    Library-level tests (eight tests: `health_proposed.rs`,
    `health_under_construction.rs`, `health_healthy.rs`,
    `health_unhealthy_fell_from_grace.rs`,
    `health_sort_and_truncation.rs`, `health_json_mode.rs`,
    `health_drilldown.rs`, `health_malformed_yaml_renders_error_row.rs`)
    live under `crates/agentic-dashboard/tests/` as Rust
    integration tests. They use the `MemStore` impl from
    `agentic-store`, seed it with synthetic `test_runs` and
    `uat_signings` rows, point the dashboard at a temporary
    `stories/` directory with fixture YAMLs, and assert on the
    rendered string (table mode) or the parsed JSON value (json
    mode). They do not shell out to the top-level binary.

    Binary-level tests (two tests: `health_json_mode.rs` and
    `health_drilldown.rs`) live under `crates/agentic-cli/tests/`
    as Rust integration tests. They drive the compiled binary via
    `assert_cmd` (or equivalent) on a single fixture story in a
    private tempdir (distinct from the repo's real `stories/`
    directory) and assert the binary-level argv-to-library wire
    is intact for JSON output and the positional drilldown id.
    The binary-under-test is whatever `CARGO_BIN_EXE_agentic`
    resolves to. The default-view observable (frontier vs
    everything) is story 10's concern and is not pinned here.

  Relationship to stories 1 and 2.
    This story READS what stories 1 and 2 write. The row contracts
    in stories 1 and 2 are sufficient to write the library-level
    tests against `MemStore` even before their impls ship. At
    runtime the dashboard is only useful once stories 1 and 2 have
    shipped, which is what `depends_on` encodes.

  Re-scope note (2026-04-20).
    Story 3's original contract bundled library-level four-status
    classification with CLI-level default-view assertions. Story 10
    (`dag-primary-lens` epic) changed the default CLI view from
    "all stories" to "frontier," which invalidated the CLI-level
    tests (they assumed promoted stories appear in the default
    view). Those two tests —
    `crates/agentic-cli/tests/cli_uses_configured_store.rs` and
    `crates/agentic-cli/tests/health_table_mode.rs` — have been
    removed from this story's acceptance; the observables they
    pinned are now story 10's concern (default-view-is-frontier) or
    can be re-raised as a separate story if the user wants an
    explicit round-trip test under `--all`. Story 3's library-level
    classification + rendering contract is unchanged. Status stays
    `under_construction` pending re-UAT against the narrower
    contract.

  Era semantics — frontier vs canopy (2026-04-22 amendment, triggered by story 21).
    The dashboard now renders two lenses over the same underlying
    classification: the default frontier and the opt-in canopy.
    Both read the same store and the same stories/ directory; they
    differ only in which rows are included and how they are
    arranged.

      - "Frontier" = the stories humans care about right now. Any
        story whose on-disk `status` is one of
        `proposed | under_construction | healthy | unhealthy` is
        on the frontier. Retired stories are filtered out before
        the four-status classifier runs. The frontier is the
        default view (no flag).

      - "Canopy" = the frontier plus every retired story, arranged
        as eras. Opted into via `agentic stories health --canopy`
        (alias: `--all-eras`). The canopy exists to give the
        reader an honest history of prior eras without re-
        cluttering the default daily view.

      - "Era" = the terminal successor of a `superseded_by` chain.
        An era is identified by its "era head": walk the chain
        forward via `superseded_by` until a story is reached that
        no other story supersedes (i.e. it is not itself retired-
        with-successor). The era head can be either a live story
        (on the frontier) or a terminal retirement (a retired
        story with no `superseded_by`); either way, it is the
        group key. A non-retired story that no one supersedes is
        its own era head. For chain `A (retired→B) → B (retired
        →C) → C (healthy)`, the era head for A, B, and C is C.

    Rendering in canopy mode.
      Rows are grouped by era head. Within each group, rows
      render in chain order (oldest retired first, era head last),
      so the reader scans a group top-to-bottom from deepest
      history to present. A retired story with no successor
      (terminal retirement) is its own single-member group. The
      existing four-status sort (`unhealthy` → `under_construction`
      → `proposed` → `healthy`, `error` above all) applies between
      groups, keyed off the era head's classification — so a group
      whose era head is unhealthy sorts above a group whose era
      head is healthy, regardless of the retired members beneath.

    JSON-mode shape (canopy-compatible, additive).
      Every story object in the `stories[]` array carries an
      `era_head_id: integer` field pointing at the terminal
      successor of that story's supersession chain. A story that
      is its own era head emits `era_head_id` equal to its own
      `id`. This field is present in BOTH frontier and canopy
      JSON output so downstream tooling has a single, stable way
      to reconstruct grouping — `stories | group_by(.era_head_id)`
      — regardless of which lens produced the output. The
      frontier JSON simply omits retired rows, so its
      `era_head_id` values are usually self-referential; the
      canopy JSON is where the grouping becomes interesting.

    Delegated concerns.
      The `retired` status itself, the `superseded_by` field, the
      loader-level referential integrity and cycle defence, and
      the chain-walk algorithm used by the ancestor gate all
      belong to story 21 — this story consumes them. The schema
      edit (adding `retired` to the status enum and the optional
      `superseded_by` field) flows through story 6's amendment
      pass per the bundling described in story 21's guidance.
      Story 3 is the dashboard's read-side expression of those
      primitives; any substantive change to the chain-walk
      semantics re-opens story 21, not story 3.

    CLI shape update.
      The authoritative argv shape becomes:

        agentic stories health [<id>] [--canopy | --all-eras]
                               [--json] [--store <path>]

      `--canopy` and `--all-eras` are aliases for the same flag —
      `--canopy` is the primary spelling (tree-metaphor
      vocabulary from research folder note 03), `--all-eras` is
      the plain-English alias for readers unfamiliar with the
      metaphor. Passing both is accepted (they are the same
      flag); no flag selects frontier by default. Drilldown
      (`<id>`) can be combined with either lens — a drilldown
      on a retired story renders its expanded view regardless
      of frontier/canopy (the frontier filter applies only to
      the table, not to explicitly-named ids).
