id: 26
title: Extract agentic-test-support
outcome: |
  A test author writing an acceptance scaffold for any workspace crate finds
  and reuses shared fixture primitives instead of reimplementing setup
  helpers per file.
status: proposed

patterns: []

assets:
  - agents/assets/principles/deep-modules.yml
  - agents/assets/definitions/identifier-forms.yml

acceptance:
  tests:
    - file: crates/agentic-test-support/tests/fixture_corpus_creates_temp_stories_dir_with_dag.rs
      justification: |
        Pins the kit's primary tempdir-plus-stories primitive: a freshly
        constructed `FixtureCorpus` returns a TempDir whose root contains
        a `stories/` subdirectory, and a series of `write_story()` calls
        produces a corpus that loads cleanly through whatever DAG-aware
        loader a downstream caller would point at it (the agentic-story
        loader for in-process tests, or a shell walker for verifier
        scripts). Without this, every consumer would re-derive the
        tempdir-and-stories-dir lifecycle the asset's deletion-test
        worked example calls out by name (`write_fixture_story` repeated
        across 8 callers in `crates/agentic-ci-record/tests/`) — exactly
        the shallow-module replication the kit exists to retire.

    - file: crates/agentic-test-support/tests/fixture_corpus_yaml_passes_story_loader_validation.rs
      justification: |
        Pins fixture-vs-production-dialect parity: YAML emitted by
        `StoryFixture` (via `FixtureCorpus::write_story()`) round-trips
        through the production `agentic_story::load_dir` loader without
        schema violations. A second-best implementation would silently
        emit a slightly-loose YAML shape (missing `status`, `patterns`
        absent rather than `[]`, conjunctions in `outcome`) that
        downstream tests accept but `agentic story lint` would reject;
        consumers would then drift from the schema the production
        loader enforces. Without this test, the kit becomes a parallel
        YAML dialect, and the deep-modules `application_to_test_scaffolding`
        rationale ("the shared kit ships setup/fixture material only")
        loses its anchor — fixtures must produce schema-clean stories or
        they are not fixtures, they are decoys.

    - file: crates/agentic-test-support/tests/fixture_repo_init_seeds_committer_email_and_returns_head_sha.rs
      justification: |
        Pins the git-seeding primitive against the canonical SHA shape:
        `FixtureRepo::init_with_email(...)` initialises a tempdir git
        repo with `committer.email` set, lands one initial commit, and
        `head_sha()` returns a 40-character lowercase hex string matching
        the `commit` form in
        `agents/assets/definitions/identifier-forms.yml` (declared in
        this story's `assets:`). The test asserts the regex
        `^[0-9a-f]{40}$` literally so a future drift to a 7- or 8-char
        abbreviated SHA — exactly the failure
        `identifier-forms.yml`'s `drift_warning` calls out for
        `commit` — fails red rather than passing silently. Without this
        pin, every downstream test that compares its captured SHA
        against an evidence row's `commit` field is at the mercy of
        whatever shape the kit happens to return.

    - file: crates/agentic-test-support/tests/recording_executor_captures_per_invocation_args.rs
      justification: |
        Pins the stub-executor primitive's per-call recording shape:
        `RecordingExecutor` invoked N times records N `RecordedCall`
        entries, each exposing the `(story_id, files)` tuple the
        invocation observed. Order of calls is preserved; reading the
        recorded calls back is a non-destructive observation. Without
        this, every consumer that needs a `TestExecutor` /
        `UatExecutor` stub would either re-roll a bespoke
        `Arc<Mutex<Vec<...>>>` pattern (the shape currently visible
        in `crates/agentic-ci-record/tests/stories_test_bare_id_runs_single_story.rs`'s
        local `StubExecutor`) or settle for a coarser test that only
        asserts total invocation count. The kit's contract is that
        per-invocation arguments are inspectable; the test pins that.

    - file: crates/agentic-test-support/tests/no_assertion_helpers_exported_in_public_surface.rs
      justification: |
        Reward-hacking guardrail at the type-level. The test reads
        `crates/agentic-test-support/src/lib.rs` via `include_str!` and
        asserts no `pub use`, `pub fn`, or `pub struct` declaration
        whose name matches `^(assert|expect|verify|check)_` exists. The
        rationale is the REWARD-HACKING GUARDRAIL paragraph in
        `agents/assets/principles/deep-modules.yml`'s
        `application_to_test_scaffolding` section (declared in this
        story's `assets:`): a shared assertion helper is a single point
        a future agent can route around to make N tests pass with one
        change, converting the per-test red-state contract into a
        green-by-default convention. Banning the export shape at the
        source-text level — not just at code-review time — is the
        cheapest defence; a future PR that adds `pub fn assert_kit_*`
        fails this test before any reviewer reads it.

    - file: crates/agentic-test-support/tests/kit_imports_resolve_under_typical_consumer_dev_dep.rs
      justification: |
        Smoke test for the kit's public-surface contract from the
        consumer side: a small integration test that `use`s each of
        the five public names (`FixtureCorpus`, `StoryFixture`,
        `FixtureRepo`, `RecordingExecutor`, `RecordedCall`) and
        constructs the minimum non-trivial value of each (a
        `FixtureCorpus::new()`, a `StoryFixture` via `write_story()`,
        a `FixtureRepo::init_with_email("ci@example.com")`, a
        `RecordingExecutor::default()`, and reads back at least one
        `RecordedCall` shape) compiles and runs green when the kit
        crate is consumed via a normal `[dev-dependencies]` declaration.
        Without this, the four shape-pinning tests above could pass
        in isolation while the kit's re-exports (the `pub use` lines
        in `lib.rs`) drift to private or to wrong-cased names that
        downstream consumers cannot import. The test is the kit-side
        companion to the actual fan-out migrations — those migrations
        live as amendments to their owning stories under
        defects-amend-the-owning-story; this story owns only the
        kit-side surface.

  uat: |
    Goal: convince yourself that a test author opening
    `crates/agentic-test-support/README.md` for the first time can
    locate a fixture primitive that covers their case, import it via
    `use agentic_test_support::<Name>`, write a green test, AND that
    the kit refuses to grow assertion helpers — both at the source
    level (the surface guard test) and at the source-text level
    (an attempt to add `assert_kit_writes_yaml(...)` is rejected
    by the same test). Verify the pilot retirement: the bespoke
    fixture helpers in
    `crates/agentic-ci-record/tests/stories_test_bare_id_runs_single_story.rs`
    are gone, replaced by kit imports — the deletion-test worked
    example in `agents/assets/principles/deep-modules.yml` cited
    that exact file as the deletion-test failing case.

    Setup:
      1. From a clean checkout on branch `main`, run
         `git status --porcelain` and confirm the working tree is
         empty.
      2. Confirm the kit builds as a library (via WSL):
         `wsl bash -c "source ~/.cargo/env && cd /home/code/Agentic
         && cargo build -p agentic-test-support"` — expect exit 0.
      3. Open `crates/agentic-test-support/README.md` and read the
         catalogue without scrolling past the fold. Observe: a
         bullet list naming exactly five public types — `FixtureCorpus`,
         `StoryFixture`, `FixtureRepo`, `RecordingExecutor`,
         `RecordedCall` — each with one paragraph naming the case
         it covers. No assertion helper is listed because none
         exists.

    Doc-blind catalogue walkthrough:
      4. Without reading any other file, pick the case "I need a
         tempdir whose `stories/` subdir contains two minimal
         stories with a `depends_on` edge between them." From the
         catalogue, identify `FixtureCorpus` as the right
         primitive.
      5. In a scratch crate with `agentic-test-support` declared
         under `[dev-dependencies]` (the kit's own
         `tests/kit_imports_resolve_under_typical_consumer_dev_dep.rs`
         is the working example), write one test that does
         `use agentic_test_support::FixtureCorpus;`, constructs
         a corpus, calls `write_story()` twice with appropriate
         `depends_on:` content, and asserts the corpus's
         `stories_dir()` contains both files. Run the test via
         `wsl bash -c "source ~/.cargo/env && cd /home/code/Agentic
         && cargo test -p agentic-test-support --test
         kit_imports_resolve_under_typical_consumer_dev_dep
         -- --nocapture"`. Observe: the test compiles and passes;
         the YAML files written are loadable through
         `agentic_story::load_dir` per the
         `fixture_corpus_yaml_passes_story_loader_validation.rs`
         contract.

    Reward-hacking guardrail walkthrough:
      6. As a deliberate experiment, edit
         `crates/agentic-test-support/src/lib.rs` to add a stub
         `pub fn assert_kit_writes_yaml(_corpus: &FixtureCorpus) {}`
         line. Re-run the kit's own tests:
         `wsl bash -c "source ~/.cargo/env && cd /home/code/Agentic
         && cargo test -p agentic-test-support --test
         no_assertion_helpers_exported_in_public_surface
         -- --nocapture"`. Observe: the test fails red, the
         diagnostic names the `assert_kit_writes_yaml` symbol
         literally. Revert the edit
         (`git restore crates/agentic-test-support/src/lib.rs`)
         and re-run; the test passes.

    Pilot retirement walkthrough:
      7. Open
         `crates/agentic-ci-record/tests/stories_test_bare_id_runs_single_story.rs`
         (story 12's acceptance test; story 26 does NOT own this
         file — its retirement is captured by story 12's amendment,
         not by this story). Confirm: the local
         `fn write_fixture_story`, `fn setup_fixture_corpus`, and
         `struct StubExecutor` definitions cited in the
         deep-modules asset's deletion-test worked example are
         gone; in their place are
         `use agentic_test_support::{FixtureCorpus, RecordingExecutor};`
         imports and direct calls to the kit primitives. The
         observable the file pins (bare-id selector runs only
         that story's tests) is unchanged; the materials are
         shared.

    Cleanup:
      8. `git status --porcelain` is empty (the experiment in
         step 6 was reverted).
      9. Drop any scratch directory created during step 5.

guidance: |
  Cross-corpus context lives in
  `agents/assets/principles/deep-modules.yml` (the principle this story
  embodies, declared in this story's `assets:` field) and
  `agents/assets/definitions/identifier-forms.yml` (the canonical SHA
  shape `FixtureRepo::head_sha()` matches, also declared via `assets:`).
  This guidance section pins only what the asset declarations do not —
  the shape of the kit, the names it exports, and what this story
  does NOT cover. Do not restate either asset's content here.

  Public surface — five names, exact.
    The kit's `lib.rs` exports exactly five public types:
      - `FixtureCorpus` — tempdir lifecycle plus a `stories/` subdir
        plus `write_story()` for authoring fixture story YAML.
      - `StoryFixture` — the typed handle a `write_story()` call
        returns; the YAML round-trips through the production
        `agentic_story` loader.
      - `FixtureRepo` — git-init-with-committer-email seeding plus
        `head_sha()` returning the canonical 40-char lowercase hex
        form (see the identifier-forms asset).
      - `RecordingExecutor` — a `TestExecutor` / `UatExecutor` stub
        that records every invocation.
      - `RecordedCall` — the per-invocation row `RecordingExecutor`
        captures, exposing `(story_id, files)` and any other
        per-call observables a consumer needs.
    Five names; one imported concept per test file; substantial
    hidden machinery. The asset's
    `application_to_implementation` section (forward-looking
    worked example) names this exact surface as the canonical
    deep-module demonstration.

  Assertion helpers are banned, unconditionally.
    The kit ships fixture / setup / stub-executor material only.
    No `assert_*`, `expect_*`, `verify_*`, or `check_*` exports —
    rationale and operational consequence are the
    `application_to_test_scaffolding` REWARD-HACKING GUARDRAIL
    paragraph in the deep-modules asset (declared in `assets:`).
    The `no_assertion_helpers_exported_in_public_surface.rs`
    acceptance test enforces this at source-text level.

  This story is NOT.
    - NOT a migration sweep of every existing bespoke fixture in
      the workspace. The pilot retirement of
      `crates/agentic-ci-record/tests/stories_test_bare_id_runs_single_story.rs`
      is an amendment to story 12 (its owning story per the
      test-file 1-to-1 binding), authored separately. Story 26
      ships the kit; the fan-out migrations are
      defects-amend-the-owning-story applied per consumer.
    - NOT a pattern extraction. There is currently no
      `patterns/<id>.yml` whose `when_to_use:` covers
      "fixture-only test-support kit"; if a second test-support
      kit ever lands, that is the moment to extract a pattern.
      Until then, the deep-modules asset (declared via `assets:`)
      carries the design rationale.
    - NOT a directory rename of `agents/assets/`. ADR-0007's
      "Alternatives considered" defers that move; it is unrelated
      to this story.
    - NOT an enforcement of kit usage on every new scaffold.
      The operational rule "prefer the kit when it covers the
      case" lives in test-builder's `prefer-shared-scaffold` rule
      under `agents/test/test-builder/process.yml`. Story 26
      ships the kit; the rule was authored against this story's
      forward-looking shape and activates the moment the kit
      lands.

  Reciprocity bookkeeping (ADR-0007).
    This story declares two assets; per ADR-0007 decision 4, both
    assets' `current_consumers:` lists must include `stories/26.yml`
    once story 26 lands as a tracked file. Story-writer does not
    own `agents/assets/**` (see `contract.yml` `does_not_touch:`),
    so the back-fill is the orchestrator's step before story 27's
    reciprocity audit can pass cleanly. Authoring this declaration
    here is correct; the back-fill is the matched move on the
    asset side.

depends_on:
  - 27
