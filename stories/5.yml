id: 5
title: Back the Store trait with an embedded SurrealDB implementation
outcome: |
  A developer can point any consumer crate at a SurrealDB-embedded
  `Store` and get the same behaviour as the in-memory implementation,
  with writes that survive process restart.
status: healthy
patterns:
- standalone-resilient-library
acceptance:
  tests:
  - file: crates/agentic-store/tests/surrealstore_trait_parity.rs
    justification: |
      Proves the trait-is-a-real-abstraction claim: the exact same
      trait-level harness that drives `MemStore` in story 4
      (upsert-replaces, append-preserves, typed-absence, empty-
      filter, Send+Sync) is re-run against a freshly-constructed
      `SurrealStore` backed by an embedded SurrealDB at a temp
      directory, and every assertion that passed for `MemStore`
      also passes for `SurrealStore`. Without this test, we have
      two store implementations that are only "alike" by
      convention — at which point any consumer relying on the
      trait will eventually discover a divergence in production.
  - file: crates/agentic-store/tests/surrealstore_durability_across_reopen.rs
    justification: |
      Proves durability across process lifetime: write N
      documents to a `SurrealStore` rooted at a temp directory,
      drop the store, construct a new `SurrealStore` pointing at
      the same directory, and verify all N documents are
      readable with identical content. Without this, SurrealDB's
      commit-is-durable guarantee is assumed rather than
      enforced at the crate boundary — and a misconfiguration
      (running an in-memory variant by mistake, missing flush,
      wrong engine) would slip past story 4's behavioural tests
      because those use `MemStore`.
  - file: crates/agentic-store/tests/surrealstore_standalone_resilience.rs
    justification: |
      Proves the standalone-resilient-library claim: a
      `SurrealStore` can be constructed and driven end-to-end
      with only `agentic-store` and its declared backend
      dependencies (the `surrealdb` crate itself, `serde`,
      `tokio` if required) wired up — no `agentic-orchestrator`,
      `agentic-runtime`, `agentic-sandbox`, or CLI crate in the
      test's link graph. Without this, `agentic-store` could
      grow an orchestrator dependency through a transitive path
      and we would only learn when the "system is in flames"
      case (the one this pattern exists for) actually happened.
  - file: crates/agentic-store/tests/surrealstore_malformed_root_is_typed_error.rs
    justification: |
      Proves clean failure on bad construction input: pointing
      `SurrealStore::open` at a path that exists but is not a
      valid SurrealDB data directory (e.g. a file, a directory
      containing unrelated files, a directory the process
      cannot write to) returns a typed `StoreError`, does not
      panic, and does not partially initialise. Without this,
      deployment-time configuration mistakes — a wrong path in
      an env var, a stale DB from an older schema — surface as
      panics halfway through the first write rather than as
      clear "could not open store" errors at startup.
  - file: crates/agentic-store/tests/surreal_snapshot_for_story_returns_ancestor_closure.rs
    justification: |
      Proves the snapshot primitive's closure property holds
      for `SurrealStore` with the same semantics story 4
      pins for `MemStore`: given a `SurrealStore` rooted at a
      temp directory whose ancestry fixture is seeded via the
      stores-table mechanism (see story 4, "Ancestry fixture
      mechanism") — three `stories` rows shaped
      `{id, depends_on}` describing the chain `leaf` ->
      `mid` -> `root` — and whose `uat_signings` table
      carries one `verdict=pass` row for each ancestor,
      `Store::snapshot_for_story(leaf_id)` returns a
      `StoreSnapshot` containing exactly the two ancestor
      signings (`root` and `mid`) and does NOT contain the
      leaf's own signing nor signings for unrelated stories
      present in the same store. Two calls against the same
      store state return byte-identical JSON when serialised
      with sorted keys. Without this, the trait-parity claim
      that story 5 was promoted on collapses: the snapshot
      method added to the trait (via story 4's amendment) would
      behave one way for `MemStore` and an unspecified way for
      `SurrealStore`, and every consumer routing through
      `Arc<dyn Store>` would hit backend-specific surprises at
      the seeding boundary. This test mirrors story 4's
      amendment test of the same shape against the production
      backend, including the same stores-table ancestry
      seeding — no env var, no filesystem `stories/` lookup.
  - file: crates/agentic-store/tests/surreal_restore_roundtrips_snapshot.rs
    justification: |
      Proves the restore primitive's idempotence and
      completeness hold for `SurrealStore`: given a source
      `SurrealStore` whose ancestry fixture is seeded via
      the stores-table mechanism (see story 4, "Ancestry
      fixture mechanism") — `stories` rows for the ancestor
      chain alongside the corresponding `uat_signings` pass
      rows — a `StoreSnapshot` produced by
      `snapshot_for_story` on that source, a fresh
      `SurrealStore` rooted at a distinct temp directory
      whose `runs` and `uat_signings` tables are empty, and
      a call to `Store::restore(snapshot)`, the destination
      store's `uat_signings` table ends with exactly the
      rows the snapshot carried (same `signer`, `verdict`,
      `commit`, and `story_id` values), and a subsequent
      ancestor-gate query (e.g. `has_pass_verdict(mid_id)`)
      returns true. A second `restore` call with the same
      snapshot is rejected with `StoreError::AlreadyRestored`
      rather than silently double-writing. Without this,
      story 20's container-side seeding step (which
      constructs a `SurrealStore` and restores the
      host-computed snapshot into it) has no trait-level
      guarantee that the ancestor gate fires correctly inside
      the sandbox — and a backend-specific divergence would
      surface as either a spurious gate refusal or a silent
      double-seed on retry. The stores-table seeding on the
      source mirrors story 4's amendment test so the snapshot
      bundle this test restores is produced from the exact
      same closure-input shape `MemStore` exercises.
  - file: crates/agentic-store/tests/surreal_snapshot_survives_drop_and_reopen.rs
    justification: |
      Proves the snapshot/restore primitives compose with
      `SurrealStore`'s durability contract: given a snapshot
      whose source ancestry was seeded via the stores-table
      mechanism (see story 4, "Ancestry fixture mechanism")
      so the carried signings correspond to a real
      closure-computed chain rather than hand-crafted rows, a
      fresh `SurrealStore` rooted at a temp directory, a call
      to `Store::restore(snapshot)` carrying three ancestor
      signings, followed by a drop of the store and a fresh
      `SurrealStore::open` against the same root, the three
      restored rows are still present with byte-identical
      content. This is the specifically-SurrealStore invariant
      — `MemStore` cannot exhibit it because it is in-memory by
      design — and it is what makes `restore` meaningful as the
      sandbox's seeding primitive: the container's embedded
      store is restored once, then operates across any number
      of internal process lifecycles against that seed. Without
      this, a sandbox that restarts its embedded store mid-run
      (e.g. after an internal crash the runtime recovers from)
      would silently lose its ancestor signings and the next
      ancestor-gate check would refuse as
      `AncestorNotHealthy` against a store that LOOKS empty but
      was seeded minutes earlier. Durability of the restore is
      not a free consequence of durability-of-writes — the
      restore's write path must actually commit, and this test
      pins that.
  uat: |
    Goal: convince yourself that the embedded SurrealDB
    implementation is drop-in interchangeable with `MemStore` for
    the behaviours story 4 pins, that its writes survive a
    reopen, and that a bad path fails cleanly rather than
    crashing.

    Setup:
      1. From a clean checkout on branch `main`, run `git status`
         and confirm the working tree is clean.
      2. Confirm `crates/agentic-store/` builds with the SurrealDB
         backend enabled (`cargo build -p agentic-store`) and that
         `SurrealStore` is publicly re-exported alongside
         `MemStore`.
      3. Pick a temp directory `<root>` you will use as the
         SurrealDB data dir. Confirm it is empty.

    Parity walkthrough:
      4. Adapt the story-4 scratch example (or write a new one
         under `crates/agentic-store/examples/trait_smoke_surreal.rs`)
         to construct a `SurrealStore::open(<root>)` instead of
         `MemStore::new()`. Run it. Observe: every printed step
         matches the expectations listed in story 4's UAT — upsert
         replaces, append preserves, absence is typed-empty,
         empty filter is an empty collection, and the two-thread
         sharing test yields two rows.

    Durability walkthrough:
      5. In a second scratch program (or by splitting the example
         into two invocations): open `SurrealStore` at `<root>`,
         append three rows to table "durable", close / drop the
         store, exit the process. Re-run a program that opens
         `SurrealStore` at the same `<root>` and queries the
         "durable" table. Observe: exactly three rows come back
         with identical content.

    Bad-path walkthrough:
      6. Construct `SurrealStore::open(<root>/no-such-nested/dir)`
         where the parent does not exist, or on a file (not
         directory) path. Observe: the call returns a typed error
         — not a panic, not a backtrace — whose message names
         the path and the underlying cause in one line.

    Cleanup:
      7. Remove the temp directory `<root>` (and any scratch
         examples you added but do not want to commit).
      8. Confirm `git status` is clean.
guidance: |
  This story adds the production-grade backend for the `Store`
  trait defined in story 4. The load-bearing proof is parity:
  the same trait-level harness passes for both impls. That is
  what turns the trait from "a nice interface" into "a real
  abstraction we can swap."

  Architectural boundary — see the standalone-resilient-library
  pattern. The store is on the "system is in flames" critical
  path (stories 1 and 2 cannot sign or record without it) and
  must be drivable as a library with only its declared backend
  dependencies in scope. Forbidden transitive deps:
  `agentic-orchestrator`, `agentic-runtime`, `agentic-sandbox`,
  `agentic-cli`. The standalone-resilience test enforces this.

  SurrealDB engine choice.
    Use the embedded local file-store engine (typically the
    `kv-rocksdb` or `kv-surrealkv` feature, whichever is the
    project's current default at implementation time — see
    `crates/agentic-store/Cargo.toml`). Do NOT use the in-memory
    SurrealDB engine for this story; that would make the
    durability test meaningless because it would pass trivially
    without touching disk. If we later need an in-memory
    SurrealDB variant (e.g. for fast CI), it is a separate impl
    and gets its own story.

  Trait parity is implemented by harness reuse, not copy-paste.
    Story 4 authors each of its five tests against `dyn Store`
    with the `MemStore` construction isolated in a single
    helper. This story reuses the exact same test bodies (via
    a shared test module, a macro, or parameterised
    construction) with the `SurrealStore` constructor swapped
    in. If a future contract change needs to be pinned at the
    trait level, it is added once in the shared harness and
    both impls test it in the next run. Do NOT duplicate the
    assertion bodies.

  Durability semantics pinned by this story.
    - A write that `put` / `append` returns Ok for is durable
      — it survives a drop of the store and a fresh `open`
      against the same root.
    - Durability is per-write; there is no explicit flush
      method in the trait and there does not need to be.
    - Reading back after reopen must yield byte-identical
      document content for the cases this story covers.
      Schemaless-by-default (ADR-0002) means SurrealDB returns
      the same document shape we wrote; we do not pin field
      ordering because that is a schemaless DB contract, not
      a consumer-observable property.

  Ancestry fixture mechanism — parity with story 4.
    The three snapshot/restore acceptance tests
    (`surreal_snapshot_for_story_returns_ancestor_closure`,
    `surreal_restore_roundtrips_snapshot`,
    `surreal_snapshot_survives_drop_and_reopen`) mirror story
    4's amendment tests shape-for-shape, and therefore use
    the SAME ancestry fixture mechanism story 4 pins: each
    test seeds a `stories` table alongside `uat_signings` on
    the `SurrealStore` under test, with rows shaped
    `{"id": <i64>, "depends_on": [<i64>, ...]}`, and relies
    on `snapshot_for_story` to read the ancestry graph from
    that table (NOT from an `AGENTIC_STORIES_DIR` env var,
    NOT from a `stories/*.yml` directory lookup, NOT from any
    ambient process state). See story 4's guidance section
    "Ancestry fixture mechanism — how `snapshot_for_story`
    learns the graph" for the full shape contract and the
    rationale. Story 5 inherits that contract unchanged;
    authoring these three tests without the stores-table
    seeding would leave `snapshot_for_story` with no ancestry
    graph to walk and the assertions unsatisfiable — which is
    the exact scaffold defect this cross-reference exists to
    prevent. The trait-parity claim requires the fixture
    mechanism to be identical across impls, not just the
    method signatures.

  Snapshot / restore on top of surrealkv (story 20's
  prerequisite, added via this story's amendment).
    `SurrealStore` inherits the two new trait methods from
    story 4's amendment: `snapshot_for_story(id) ->
    StoreSnapshot` and `restore(snapshot) -> Result<()>`.
    Two implementation shapes are available on top of the
    embedded surrealkv backend; pick ONE and document the
    choice in the crate's implementation notes:

      (a) Transactional export (preferred). Open a SurrealDB
          read transaction, walk the `uat_signings` table
          with a `WHERE story_id IN (...)` query computed
          from the story DAG, serialise the matching rows
          into the `StoreSnapshot` shape, and commit (or
          drop) the read transaction. Restore opens a write
          transaction, inserts every row from the snapshot
          into `uat_signings`, and commits atomically. The
          one-shot guard (`StoreError::AlreadyRestored`) is
          enforced by a pre-insert count query on the
          destination table inside the same transaction.
          Tradeoff: relies on SurrealDB's transaction
          semantics being honest over surrealkv (they are,
          per the current embedded docs) and pins us to
          whichever transaction API the `surrealdb` crate
          exposes at implementation time.

      (b) Naive iterate-all-prefix. Do a full table scan of
          `uat_signings`, filter in-process against the DAG
          closure, emit the snapshot. Restore iterates the
          snapshot and calls `append` per row. The one-shot
          guard does a separate `query` first to check for
          any existing `uat_signings` rows; fails if
          non-empty. Tradeoff: simpler, backend-agnostic
          shape that would port unchanged to story 22's
          cloud impl, but the restore is not atomic — a
          partial failure halfway through leaves the
          destination in a half-seeded state with no
          rollback. For Phase 0 this is acceptable (the
          sandbox's embedded store is disposable scratch; a
          bad restore aborts the container and the next run
          opens a fresh store) but the preference is (a) for
          the cleaner atomicity story.

    Either way, the behavioural contract pinned by the three
    new acceptance tests is the same: ancestor-closure is
    exact, restore is one-shot, and the restored rows
    survive a drop and reopen. The trait parity with
    `MemStore` (story 4) is the load-bearing proof that the
    choice of (a) vs (b) is an implementation concern, not a
    consumer-observable one.

  Cloud-swap compatibility — see project memory.
    The store will eventually move from local embedded
    SurrealDB to a cloud target. The consumer-facing surface
    is the `Store` trait from story 4; that contract is what
    keeps the swap a config change. This story's SurrealDB
    impl is allowed to reach into SurrealDB-specific APIs
    inside `agentic-store`, but it must not leak any of those
    specifics back up through the trait.

  Construction and configuration.
    `SurrealStore::open(root: impl AsRef<Path>) -> Result<Self,
    StoreError>`. A single path argument is enough for Phase 2.
    Do not accept connection URLs, auth tokens, or remote
    endpoints yet — those are a cloud-swap concern and belong
    to a later story so we do not preemptively shape the
    config surface for a backend we do not yet have.

  Error contract.
    `StoreError` is a typed enum. The specific variants are
    an implementation concern, but the two shapes pinned by
    tests in this story are: `StoreError::Open` (with the
    offending path and cause) and whatever variant represents
    "backend refused this write" if it surfaces during the
    parity tests. Do NOT return `anyhow::Error` at the public
    boundary; the trait's surface must stay typed so consumer
    crates can pattern-match on failure modes.

  Test file locations.
    All seven tests (four original + three added by this
    amendment) live under `crates/agentic-store/tests/` as
    Rust integration tests. They construct the store at a
    `tempfile::TempDir`, drive it directly, and clean up at
    drop. None of them shell out to the top-level `agentic`
    binary. None of them depend on any other workspace crate.

  Relationship to stories 1, 2, 3, 4, 20.
    Story 4 defines the trait and ships `MemStore`. This story
    ships `SurrealStore` behind the same trait. Stories 1, 2,
    and 3 use the trait via `Arc<dyn Store>` and therefore work
    against either impl at runtime. Phase 2 ships with
    `SurrealStore` as the CLI default and `MemStore` as the
    test-time default. Story 20 (`agentic story build`) is the
    trigger for this amendment: its sandbox seeding step needs
    `snapshot_for_story` / `restore` on the production backend,
    so `SurrealStore` must implement them at parity with
    `MemStore` (which story 4's amendment pins for the in-
    memory impl). This story is UPSTREAM of story 20; per the
    eventual-consistency posture documented in
    `docs/research/story_tree/13-existing-stories-impact.md`,
    this story's `depends_on` stays as-it-was (story 4 only)
    and both sides sit red in parallel until the pipeline
    converges. No back-edge is added from this story onto
    story 20.
depends_on:
- 4
related_files:
