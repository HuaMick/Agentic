id: 8
title: "Wire the agentic binary to run a UAT and read the dashboard end-to-end"

outcome: |
  A developer runs the installed `agentic` binary against a checked-out
  repo to sign a UAT verdict and read the resulting story health from
  one shared store without writing any Rust to compose the pieces.

status: under_construction

patterns: []

acceptance:
  tests:
    - file: crates/agentic-cli/tests/health_table_mode.rs
      justification: |
        Proves the table-mode wiring: running the `agentic` binary
        with `stories health` against a fixture `stories/` directory
        and an empty tempdir store writes the table header row, zero
        data rows (because the fixture stories directory is empty),
        and exits 0. Without this the CLI-to-`Dashboard::render_table`
        wire is a library-level claim only — story 3 pins rendering
        behaviour against `Dashboard` directly, not through the
        binary, so a broken argv-to-Dashboard path would go unnoticed.

    - file: crates/agentic-cli/tests/health_json_mode.rs
      justification: |
        Proves the `--json` flag is plumbed: running
        `agentic stories health --json` against the same empty
        fixture emits stdout that `serde_json::from_str` parses into
        a value with `stories` (array) and `summary` (object) keys,
        and exits 0. Without this, JSON-mode consumers (future CI
        status checks, dashboards reading the binary's output) would
        have to discover via runtime failure whether the flag reached
        the `Dashboard::render_json` call at all.

    - file: crates/agentic-cli/tests/health_drilldown.rs
      justification: |
        Proves the positional `<id>` argument selects drilldown
        mode: `agentic stories health <id>` against a fixture story
        emits a single-story view (not the table header) and exits
        0; running against an id that does not exist on disk exits
        non-zero with a message naming the missing id. Without this,
        the only way to access `Dashboard::drilldown` is via Rust,
        defeating the purpose of the subcommand for an operator.

    - file: crates/agentic-cli/tests/uat_pass_promotes.rs
      justification: |
        Proves the happy path end-to-end through the binary:
        `agentic uat <id> --verdict pass` on a clean fixture repo
        with a valid story returns exit 0, writes exactly one row
        to the configured store's `uat_signings` table with
        `verdict=pass` and the fixture HEAD SHA, and rewrites the
        fixture's `stories/<id>.yml` to `status: healthy`. Without
        this we cannot claim the CLI is a real path to `healthy` —
        story 1 proves the library does it, but the binary could
        still fail to construct `Uat` correctly or drop the
        promotion on the floor.

    - file: crates/agentic-cli/tests/uat_fail_does_not_promote.rs
      justification: |
        Proves the Fail exit-code contract flows through the binary:
        `agentic uat <id> --verdict fail` on the same clean fixture
        returns exit 1 (not 0, not 2), writes exactly one row with
        `verdict=fail`, and leaves the fixture YAML's `status:`
        field untouched. Without this a Fail could either silently
        promote (catastrophic) or surface as exit 2 and be confused
        with "the CLI itself could not run," which breaks CI's
        distinction between a real negative verdict and a system
        fault.

    - file: crates/agentic-cli/tests/uat_dirty_tree_exits_2.rs
      justification: |
        Proves the fail-closed contract at the binary boundary:
        with an uncommitted change in the fixture repo,
        `agentic uat <id> --verdict pass` exits 2, writes zero rows
        to `uat_signings`, and leaves the fixture YAML unchanged.
        Without this, the dirty-tree refusal pinned by story 1 at
        the library level is not proven to reach the operator via
        the expected exit code — a wrapper that mistranslated the
        error to exit 1 would silently turn "could not verdict"
        into "real failure."

    - file: crates/agentic-cli/tests/uat_requires_verdict_flag.rs
      justification: |
        Proves argv validation exits 2, not 0 or 1:
        `agentic uat <id>` with no `--verdict` flag returns exit 2
        (malformed args), writes no store row, and does not touch
        the story YAML. Without this, a user typo or scripted
        invocation missing the flag could surface as a panic or as
        exit 1 (which CI would treat as a real UAT failure) rather
        than as the documented could-not-verdict code.

    - file: crates/agentic-cli/tests/cli_uses_configured_store.rs
      justification: |
        Proves the two subcommands share one store: after
        `agentic uat <id> --verdict pass --store <tempdir>`
        promotes a fixture story, running
        `agentic stories health --store <tempdir>` on the same
        tempdir reports that story as `healthy` with a `Healthy at`
        cell populated from the just-written `uat_signings` row.
        Without this end-to-end check, the dashboard could read a
        different default store than the UAT command wrote to, and
        the binary would look correct in isolation but produce
        silently inconsistent state in any real session.

  uat: |
    Goal: convince yourself that after installing the `agentic`
    binary you can run a UAT and read its result from the
    dashboard against this repo's own stories, that a Fail and a
    dirty tree surface with the right exit codes, and that
    `--json` mode is consumable.

    Setup:
      1. From a clean checkout on branch `main`, run
         `git status --porcelain` and confirm the output is empty.
         If it is not, stash or commit first.
      2. Install the binary from this workspace:
         `cargo install --path crates/agentic-cli --locked`.
         Confirm `agentic --version` (or at minimum
         `command -v agentic`) resolves to the just-installed
         binary.
      3. Choose a store location for this UAT run. The binary's
         default store path is documented in guidance below;
         for a clean UAT, pass an explicit `--store <tempdir>`
         (e.g. `export AGENTIC_STORE=$(mktemp -d)`) so the
         signing rows you write here do not mingle with any
         prior state. Confirm the tempdir is empty.

    Dashboard baseline walkthrough:
      4. Run `agentic stories health --store "$AGENTIC_STORE"`.
         Observe:
         - Process exits 0.
         - Output is a single table whose header matches
           `ID | Title | Health | Failing tests | Healthy at`
           (the format pinned by story 3).
         - Because `$AGENTIC_STORE` is empty, every story with
           `status: under_construction` on disk renders as
           `under_construction`, proposed stories render as
           `proposed`, and no story renders as `healthy`.

    Pass-and-promote walkthrough:
      5. Pick a story `<pass-id>` whose current on-disk status
         is `proposed` or `under_construction` and whose UAT you
         have just finished walking through manually (that is
         the whole point of `--verdict pass` — the orchestrator
         has already decided). Record its current `status:` by
         opening the YAML file.
      6. Run `agentic uat <pass-id> --verdict pass --store
         "$AGENTIC_STORE"`. Observe:
         - Process exits 0.
         - stdout includes the string `pass` and a commit hash
           that matches `git rev-parse HEAD`.
         - The file `stories/<pass-id>.yml` now has
           `status: healthy` on disk (`grep '^status:'
           stories/<pass-id>.yml`).
      7. Run `agentic stories health --store "$AGENTIC_STORE"`
         again. Observe: the row for `<pass-id>` now renders in
         the `healthy` group with a `Healthy at` cell populated
         by the short SHA and a relative age like "just now".

    Fail-without-promotion walkthrough:
      8. Pick a different story `<fail-id>`. Note its current
         status. Run
         `agentic uat <fail-id> --verdict fail --store
         "$AGENTIC_STORE"`. Observe:
         - Process exits 1 (not 0, not 2). Check with
           `echo $?`.
         - stdout includes the string `fail`.
         - The file `stories/<fail-id>.yml` is unchanged —
           `status:` is whatever it was before.
         - `agentic stories health --store "$AGENTIC_STORE"`
           still classifies `<fail-id>` by its YAML status plus
           the Fail evidence; the fell-from-grace rule applies
           only if a prior Pass exists, which it does not here.

    Dirty-tree refusal walkthrough:
      9. With the tree still clean, introduce an uncommitted
         change: `echo x >> README.md` (do NOT commit). Run
         `agentic uat <pass-id> --verdict pass --store
         "$AGENTIC_STORE"`. Observe:
         - Process exits 2. Check with `echo $?`.
         - stderr names the dirty tree as the cause; stdout
           contains neither `pass` nor `fail`.
         - `stories/<pass-id>.yml` is unchanged (still
           `healthy` from step 6).

    JSON-mode walkthrough:
     10. Restore the tree: `git restore README.md`. Then run
         `agentic stories health --store "$AGENTIC_STORE" --json
         | jq .`. Observe:
         - Output parses as JSON.
         - Top-level keys include `stories` (array) and
           `summary` (object).
         - The `<pass-id>` entry in `stories[]` has
           `health: "healthy"` and `uat_commit` is the full
           40-char SHA (not truncated).

    Bad-args walkthrough:
     11. Run `agentic uat <pass-id>` with NO `--verdict` flag.
         Observe: process exits 2. No new row is written to the
         store (repeat step 10 and confirm the `<pass-id>`
         summary counts are unchanged).

    Cleanup:
     12. Revert the promotion if you do not want to keep it:
         `git checkout stories/<pass-id>.yml`. Confirm
         `git status --porcelain` is empty.
     13. Remove the ephemeral store directory:
         `rm -rf "$AGENTIC_STORE"`.
     14. If you want the installed binary gone from your
         toolchain: `cargo uninstall agentic-cli`.

guidance: |
  This story owns ONLY the CLI-to-library wiring and the
  end-to-end composition. The library-level invariants it rides
  on are already pinned elsewhere:

  - Story 1 (`agentic-uat`) owns `Uat::run` behaviour: dirty-tree
    refusal, unknown-story refusal, the append to `uat_signings`,
    and the YAML rewrite on Pass. This story does NOT re-prove
    any of those at the library level; it proves the binary
    produces the right exit code and preserves the same side
    effects when the library result comes back.
  - Story 3 (`agentic-dashboard`) owns the classification rules,
    table format, JSON shape, drilldown body, and malformed-YAML
    tolerance. This story does NOT re-prove any of those; it
    proves the binary reaches `Dashboard::render_table`,
    `Dashboard::render_json`, and `Dashboard::drilldown` with
    the arguments the user supplied.

  Deliberately minimal scope.
    This is "bare-bones CLI" wiring. Not in scope: a full command
    tree, `--help` golden-file tests, `ci record` plumbing
    (story 3's dashboard tolerates `test_runs` absence, so a
    missing recorder subcommand does not block the end-to-end
    UAT workflow), shell completion, colorised output, progress
    bars. Any of those is a separate story when demand for it
    exists.

  Orchestrator-driven UAT, not agent-driven.
    `agentic uat <id> --verdict <pass|fail>` is the
    orchestrator-supplies-the-verdict path. The human (or a
    Claude Code session acting as orchestrator) has already
    walked through the story's prose UAT and decided the
    verdict; the CLI exists to sign that decision. Internally,
    this maps to constructing
    `agentic_uat::StubExecutor::always_pass()` when
    `--verdict pass` is passed and
    `agentic_uat::StubExecutor::always_fail()` when
    `--verdict fail` is passed, then calling `Uat::run`. A
    future story may add an agent-driven executor behind a
    different flag (e.g. `--executor claude`); keep the
    `--verdict` flag mandatory for now rather than defaulting
    it, so the operator's decision is always explicit in the
    command line.

  Exit-code contract for `agentic uat` — inherited from story 1.
    0 = Pass verdict (story promoted to healthy).
    1 = Fail verdict (real result).
    2 = Could not produce a verdict. Triggers covered here:
        dirty tree, unknown story id, store unavailable,
        missing `--verdict` flag, unparseable args, store
        construction failure. CI distinguishes 1 from 2 —
        treat this mapping as the CLI's public contract, not
        an implementation detail.

  Exit-code contract for `agentic stories health`.
    0 = rendered successfully (including the case where the
        dashboard marks a row as `error` because of malformed
        YAML — that is inside story 3's tolerance). In
        drilldown mode, an unknown `<id>` exits non-zero with
        a clear message (stderr names the missing id); story
        3's `DashboardError::UnknownStory` already carries the
        right shape. Non-zero is also acceptable for the
        failure modes story 3 already declines to tolerate
        (store unreachable, stories/ directory missing).

  Store location — default and override.
    The binary MUST accept an explicit store location (flag
    name `--store` on both subcommands, OR environment variable
    `AGENTIC_STORE`; implementation may support either or both
    as long as one is documented). When neither is supplied,
    the default is `$XDG_DATA_HOME/agentic/store` if
    `$XDG_DATA_HOME` is set, else `$HOME/.local/share/agentic/store`
    on Unix. On Windows, mirror via `dirs`-style resolution
    (`%LOCALAPPDATA%\agentic\store`). Record the resolved path
    on stderr once at startup of each subcommand so the user
    always knows which store was hit. Do NOT default to a
    project-local `./.agentic-store/` — two workspaces on the
    same machine should not silently share a store just
    because the cwd differs, and a per-user default matches
    the expectation set by the dashboard reading and the UAT
    gate writing the same rows across sessions. Future cloud
    swap is a config change (project memory: the store moves
    to cloud; do not hard-code local paths deep in consumer
    code).

  SurrealStore, not MemStore.
    The binary constructs `agentic_store::SurrealStore::open`
    (story 5) because `MemStore` is lost on process exit and
    the whole point here is durable signing. Tests in this
    story use a `tempfile::TempDir` as the `--store` argument
    so the `SurrealStore` is real (preserving the same code
    path the installed binary takes) but isolated per-test.

  Parser choice — flag for build-rust.
    The story does not dictate `clap` vs `argh` vs a
    hand-rolled parser. Preference is `clap` (`derive` feature)
    because the team already knows it and the exit-code
    handling is explicit; `argh` is acceptable if the
    resulting binary is meaningfully smaller or compiles
    faster. A hand-rolled parser is accepted only if the
    parser's own tests live inside this story's acceptance
    suite (we are not adding a fourth micro-crate to hold
    it). Whatever choice is made, it is pinned by this
    story's tests rather than restated here.

  Allowed dependencies for `agentic-cli`.
    `agentic-dashboard`, `agentic-uat`, `agentic-store`,
    `agentic-story`, one argument parser (`clap` or `argh`),
    `serde_json`, `git2`. Dev-dependencies: whatever drives
    the end-to-end tests (recommended: `assert_cmd`,
    `predicates`, `tempfile`). Forbidden (same boundary
    stories 1, 2, 5 enforce via the standalone-resilience
    pattern): `agentic-orchestrator`, `agentic-runtime`,
    `agentic-sandbox`. The CLI is the composition root, but
    it is still the LEAST privileged crate in terms of
    runtime capability — if a feature requires one of the
    forbidden crates, that feature belongs in a different
    subcommand owned by a different story.

  Why the standalone-resilient-library pattern is NOT applied.
    The pattern's `when_to_use` clause targets crates that
    must produce a correct verdict when the system is in
    flames. `agentic-cli` is the outermost layer — it IS the
    thing we call the resilient libraries from. Loading the
    CLI also loads everything underneath, so "standalone" is
    meaningless here. The dependency-floor discipline is
    enforced by the explicit allow-list above instead of by
    that pattern's standalone-resilience test.

  CLI shape (authoritative — this is the contract the tests
  pin, not a suggestion):
    agentic stories health [<id>] [--json] [--store <path>]
    agentic uat <id> --verdict <pass|fail> [--store <path>]

    Positional `<id>` on `stories health` is optional and
    selects drilldown mode when present. `<id>` on `uat` is
    required. `--verdict` on `uat` is required; the CLI must
    reject a missing `--verdict` with exit 2 (not 0, not 1).

  Test file locations and style.
    All eight tests live under `crates/agentic-cli/tests/` as
    Rust integration tests. They drive the compiled binary
    via `assert_cmd` (or equivalent), construct a
    `tempfile::TempDir` for `--store`, construct a separate
    `TempDir` seeded with a minimal `stories/` directory and
    a small git repo (HEAD commit required for the signing
    path), and invoke `agentic` with its full argv. They do
    NOT import `agentic_uat::Uat` or
    `agentic_dashboard::Dashboard` directly — that would
    collapse the end-to-end claim back to the library-level
    claims stories 1 and 3 already cover. The binary-under-test
    is whatever `CARGO_BIN_EXE_agentic` resolves to.

    The fixture `stories/` directory is private to each test;
    none of these tests touch the repo's real `stories/`
    directory at `stories/` off the workspace root. This
    keeps `cargo test` on a developer's machine from
    accidentally promoting a real story.

  Relationship to stories 1, 2, 3, 5, 6.
    Stories 1 and 3 are functional dependencies — this story
    instantiates their library types directly. Story 2
    (`agentic-ci-record`) is NOT a dependency for two reasons:
    story 3's dashboard tolerates `test_runs` absence (so the
    dashboard renders without any `ci record` having run),
    and the `agentic uat` subcommand does not read
    `test_runs`. Story 5's `SurrealStore` is the runtime
    store, but this story does not gate on story 5 reaching
    `healthy` — if the `SurrealStore` contract diverges from
    `MemStore`, that is story 5's defect to catch, not this
    story's. Story 6's loader is used transitively by stories
    1 and 3; we inherit whatever it pins.

depends_on: [1, 3]
