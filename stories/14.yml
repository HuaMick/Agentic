id: 14
title: test-builder authors real acceptance tests via the local claude subprocess
outcome: |
  A developer running `agentic test-build <id>` against a proposed story
  receives scaffolds whose bodies are real acceptance tests derived from
  each justification, so build-rust can drive the story from red to green
  without editing the tests.

status: under_construction

patterns:
- standalone-resilient-library
- fail-closed-on-dirty-tree

acceptance:
  tests:
  - file: crates/agentic-test-builder/tests/scaffold_body_imports_target_crate_symbols.rs
    justification: |
      Proves the scaffold actually exercises the story's contract at the
      type level: given a fixture story whose justification names a
      symbol in a target crate (`TargetStruct::do_work`) that the crate
      does not yet declare, `TestBuilder::run` writes a scaffold that
      `use`s the target crate and calls the named symbol (or a close
      analogue). `cargo check --workspace --tests` fails with a rustc
      error attributable to the unresolved import, and the red-state
      JSONL row carries `red_path: "compile"` with `diagnostic` equal
      to the first line of the rustc error. Without this, the scaffold
      body could be a panic-stub that never names the target crate's
      symbols — ungreenable by any implementation, which is the exact
      gap this story closes. The scaffold must read as a real
      acceptance test whose path to green is "implement the named
      symbol."

  - file: crates/agentic-test-builder/tests/scaffold_body_asserts_on_justification_observable.rs
    justification: |
      Proves runtime-red via a real assertion derived from the
      justification: given a fixture story whose justification names an
      observable ("the function returns 1 for valid input") and whose
      target crate already declares a callable stub that returns 0,
      `TestBuilder::run` writes a scaffold that calls the stub and
      asserts the named observable. `cargo test` runs it; the test fails
      on `assertion failed` (not on `panic!(<text>)` with the
      justification as a message). The red-state row carries
      `red_path: "runtime"` with `diagnostic` captured from the
      assertion's panic output. Without this, the runtime-red path
      degrades to the panic-stub shape, which cannot be turned green by
      editing the implementation — only by editing the test, which
      build-rust is forbidden from doing.

  - file: crates/agentic-test-builder/tests/scaffold_body_survives_implementation_turning_it_green.rs
    justification: |
      Proves the greenability contract: given the fixture from
      `scaffold_body_asserts_on_justification_observable`, after the
      scaffold is written and the red-state evidence recorded, editing
      ONLY the target crate's `src/` (changing the stub to satisfy the
      observable the scaffold asserts) causes `cargo test` against that
      scaffold to exit 0. No edit to the scaffold file is required. The
      scaffold file's bytes remain unchanged between red-state and green
      runs (preserved by the existing bytes-immutable rule). Without
      this, the scaffold is ungreenable by implementation and the
      red-green contract ADR-0005 names is theatre — an implementer
      could write any code and the scaffold would still panic.

  - file: crates/agentic-test-builder/tests/scaffold_body_is_parseable_rust.rs
    justification: |
      Proves syntactic validation: given any fixture story whose
      justifications are substantive, every scaffold the binary writes
      parses as a valid Rust source file (via `syn::parse_file` or
      equivalent). If `claude`'s output is not parseable Rust (malformed
      token stream, truncated block, mixed prose-and-code), the binary
      returns `TestBuilderError::ScaffoldParseError` naming the
      offending file path and the parser's error message, writes zero
      scaffolds (even for the valid sibling entries in the same story),
      writes zero evidence, and leaves the tree in its pre-run state.
      Without this, a claude timeout or a malformed response would
      produce a half-written scaffold that breaks the workspace's
      `cargo check` for reasons unrelated to the story's contract — a
      corruption mode distinct from any currently-pinned failure.

  - file: crates/agentic-test-builder/tests/scaffold_body_is_cached_by_content_hash.rs
    justification: |
      Proves determinism within a commit: given a fixture story and a
      populated scaffold cache (`$AGENTIC_CACHE/test-builder/scaffolds/
      <hash>.rs`, where `<hash>` is a SHA-256 of the cache key —
      justification text + crate conventions context + model id), a
      second `TestBuilder::run` against the same story at the same
      commit with the cache present does NOT spawn `claude`, serves
      the cached body verbatim, and produces a scaffold byte-identical
      to the first run. A cache miss (empty cache or altered
      justification) invokes `claude` and populates the cache.
      Without this, rerunning test-build on the same commit yields
      different scaffolds every time, breaking the reproducibility
      downstream audits and the dashboard's `uat_signings.commit`
      comparisons rely on.

  - file: crates/agentic-test-builder/tests/claude_unavailable_is_fail_closed.rs
    justification: |
      Proves the fail-closed contract on an unavailable `claude` binary:
      given a fixture where `claude` is not on `PATH` (or the wrapper
      exit-codes in a way that indicates auth failure — no
      `~/.claude/.credentials.json`, or the subprocess exits non-zero
      before emitting output), `TestBuilder::run` returns
      `TestBuilderError::ClaudeUnavailable` with a typed reason,
      writes zero scaffolds (even for cache hits that could have been
      served — one fail-closed axis governs the whole run), writes zero
      evidence, and leaves the tree in its pre-run state. Without this,
      a CI runner without `claude` auth would silently skip real
      scaffolding and produce evidence rows claiming red against empty
      or partial files.

  - file: crates/agentic-test-builder/tests/claude_timeout_is_fail_closed.rs
    justification: |
      Proves the fail-closed contract on a `claude` subprocess that
      exceeds the per-scaffold wall-clock budget (documented in
      guidance; default 120 seconds). The subprocess is SIGTERMed,
      `TestBuilder::run` returns `TestBuilderError::ClaudeTimeout`
      naming the offending justification index, writes zero scaffolds
      for the story, writes zero evidence, and leaves the tree in its
      pre-run state. The already-elapsed scaffolds for sibling
      justifications in the same story are rolled back (any file
      written before the timeout is deleted). Without this, a hung
      `claude` would either block the CI runner indefinitely or leave
      a partially-scaffolded story whose evidence row disagrees with
      the files on disk.

  - file: crates/agentic-cli/tests/test_build_invokes_claude_and_writes_real_scaffold.rs
    justification: |
      Proves the contract reaches the operator through the binary:
      running `agentic test-build <fixture-id>` against a fixture
      `stories/` directory and a stubbed `claude` binary on `PATH`
      (via a tempdir that prepends an executable shim) invokes the
      shim exactly once per acceptance.tests[] entry, captures stdout
      as the scaffold body, writes parseable Rust scaffolds to the
      declared paths, and records the red-state JSONL row with a
      non-empty diagnostic per scaffold. The binary's exit code is 0
      on success. Without this, the library-level claims are
      library-level claims only — the argv-to-subprocess wire could
      drop the prompt or mangle the captured output and the operator
      would never notice.

  uat: |
    Goal: convince yourself that `agentic test-build <id>` produces
    scaffolds whose bodies are real acceptance tests (not panic-stubs),
    that an implementation edit in the target crate's `src/` turns the
    scaffold green without touching the scaffold file, that rerunning
    on the same commit produces byte-identical scaffolds, and that the
    binary fails closed when `claude` is unavailable or times out.

    Setup:
      1. From a clean checkout on branch `main`, run `git status` and
         confirm the working tree is clean.
      2. Confirm `command -v claude` resolves to a local binary and
         `claude --help` exits 0 (the subprocess contract relies on it
         per ADR-0003).
      3. Install the CLI: `cargo install --path crates/agentic-cli
         --locked`. Confirm `command -v agentic` resolves to the just-
         installed binary.
      4. On a scratch branch, author a small fixture story at
         `stories/<fixture-id>.yml` with `status: proposed`, two
         acceptance.tests[] entries whose justifications are
         substantive prose naming observables in a new
         `crates/<fixture-crate>/` (e.g. "returns 1 for valid input",
         "errors with `InvalidInput` for negative arguments"), and a
         `crates/<fixture-crate>/` shell with a stub implementation
         that does not yet satisfy either observable. Commit the
         scratch branch so the tree is clean.

    Happy-path walkthrough:
      5. Run `agentic test-build <fixture-id>`.
      6. Observe:
           - Process exits 0.
           - stdout names each created scaffold path, the red_path
             classification (`compile` or `runtime`), and confirms
             `claude` was invoked once per justification.
           - `git status --porcelain` lists exactly the two new
             scaffold files under `crates/<fixture-crate>/tests/` plus
             the evidence JSONL under `evidence/runs/<fixture-id>/`.
      7. Open the two scaffold files. Confirm by eye that each:
           - `use`s the target crate via its declared crate name.
           - Contains a `#[test]` function whose body constructs the
             types or calls the functions the justification names.
           - Asserts on the observable the justification names (NOT
             `panic!("<first line of justification>");`).
      8. `cat` the evidence file. Confirm each `verdicts[].diagnostic`
         is the first line of the real rustc error or assertion panic
         (NOT the justification text itself).

    Greenability walkthrough:
      9. Edit ONLY `crates/<fixture-crate>/src/` to satisfy one of the
         two observables the scaffolds assert.
     10. Run `cargo test --package <fixture-crate>` against that single
         scaffold. Confirm it exits 0. Confirm the scaffold file's
         bytes have not changed (`git diff crates/<fixture-crate>/
         tests/` is empty).
     11. Re-edit `src/` to satisfy the second observable. Confirm the
         second scaffold now exits 0 under `cargo test`. Both
         scaffolds green without a single edit to any test file.

    Reproducibility walkthrough:
     12. `git clean -fd` the scaffolds and the evidence. Run
         `agentic test-build <fixture-id>` again. The second run
         serves the cached scaffolds (observe stdout naming a cache
         HIT per justification). `diff` the new scaffolds against the
         git-committed versions of the first run — byte-identical.

    Fail-closed walkthroughs:
     13. Temporarily hide `claude` from `PATH` (e.g. `PATH=/usr/bin
         agentic test-build <fixture-id>`). Confirm:
           - Process exits 2 (could-not-verdict).
           - stderr names `ClaudeUnavailable`.
           - No scaffolds were written, no evidence written, tree
             matches its pre-run state.
     14. Restore `PATH`. Point `AGENTIC_TEST_BUILD_CLAUDE_TIMEOUT` to
         a very small value (e.g. `1ms`). Run `agentic test-build
         <fixture-id>` with the cache cleared. Confirm:
           - Process exits 2.
           - stderr names `ClaudeTimeout` and the offending
             justification index.
           - No scaffolds, no evidence, tree matches pre-run state.

    Cleanup:
     15. `git checkout -- .` and `git clean -fd` to reset the scratch
         branch to its pre-walkthrough state.
     16. Revert to `main` and delete the scratch branch.
     17. If you want the installed binary gone: `cargo uninstall
         agentic-cli`.

guidance: |
  This story upgrades `agentic test-build <id>` from the panic-stub
  demonstration shape story 7 landed with to a claude-backed real-
  acceptance-test authoring shape, closing the ungreenability gap
  found during story 10's implementation attempt: a panic-stub
  scaffold is always panic — build-rust cannot drive it green
  without editing the test, which its contract forbids (ADR-0005).
  Stories 10, 11, 12, 13 (the dag-primary-lens epic) cannot leave
  `proposed` without this fix on disk; story 10 is already
  `under_construction` and depends on the upgraded behaviour.

  What is UNCHANGED from story 7:
    - The fail-closed-on-dirty-tree gate, exit-code mapping, and
      typed `TestBuilderError::DirtyTree`.
    - The preservation rule: a file that already exists non-empty is
      never opened for writing. An LLM-authored scaffold written by
      a previous run is preserved exactly like a hand-authored one.
      The bytes-immutable invariant does not loosen.
    - The evidence row shape: `run_id`, `story_id`, `commit`,
      `timestamp`, `verdicts`. Each verdict carries `file`,
      `verdict in {red, preserved}`, plus for `red` only `red_path
      in {compile, runtime}` and `diagnostic` (first line of the
      rustc error for compile-red, first line of the panic / assert
      output for runtime-red). Downstream agents (build-rust,
      `agentic uat`, future `agentic-verify`) parse this shape
      unchanged; this story does NOT extend the schema.
    - The thin-justification refusal and the zero-acceptance-tests
      refusal. Both remain `TestBuilderError` variants, both remain
      typed, both remain fail-closed on the whole story.
    - The narrow `[dev-dependencies]` authority in the target crate's
      `Cargo.toml`. No widening.
    - The story-7 test suite. Every test in `stories/7.yml` continues
      to pass — they pin evidence-shape and fail-closed invariants,
      not scaffold-body byte content. Reading them in light of this
      story's changes: `scaffolds_missing_files.rs` still observes
      runtime-red with non-empty diagnostic (the assertion text
      instead of the justification text; both are non-empty).
      `scaffolds_compile_red_variant.rs` still observes compile-red
      attributable to a missing symbol (the scaffold now `use`s a
      real undeclared symbol). `preserves_existing_tests.rs` still
      observes bytes-identical existing files. `evidence_row_shape.rs`
      still observes the documented JSONL keys.

  What is NEW in this story:
    1. Scaffold bodies are generated by a `claude -p` subprocess
       call per acceptance.tests[] entry, not by a deterministic
       panic-stub template.
    2. A content-addressed scaffold cache under
       `$AGENTIC_CACHE/test-builder/scaffolds/<sha256>.rs`
       (default `$XDG_CACHE_HOME/agentic/test-builder/scaffolds/`
       or platform-equivalent) stores `claude`'s output keyed on
       the justification + crate context + model id. Cache hits
       serve the same bytes across reruns at the same commit.
    3. Two new typed errors — `ClaudeUnavailable`,
       `ClaudeTimeout`, `ScaffoldParseError` — extend the fail-
       closed axis story 7 established. All three map to exit
       code 2 (could-not-verdict) through the existing CLI shim.

  Story 7's guidance says "Scaffold shape is deterministic from
    justification" and names the panic-stub shape. Story 7's tests
    do NOT byte-pin the scaffold body; they pin evidence row shape,
    file creation, non-emptiness, preservation bytes-identity, the
    red_path discriminant, and the dirty-tree / thin-justification /
    zero-tests refusals. The invariant in story 7's guidance is a
    guidance claim, not a test-pinned contract. Upgrading the
    scaffold body to a claude-authored real acceptance test leaves
    every test in story 7 still passing. A subsequent story-writer
    invocation AFTER this story ships `healthy` updates story 7's
    guidance to read "Scaffold shape is a claude-authored real
    acceptance test whose reproducibility is content-hash cached"
    and auto-reverts story 7 to `under_construction` per the
    lifecycle rule. Pre-editing story 7 at this story's authoring
    time would re-open it prematurely, and its current guidance is
    not so wrong that it cannot wait.

  Why this is a separate story from 7.
    Story 7 ships the evidence-atomicity contract (the red-state
    record is committable, fail-closed, preservation-safe, typed-
    errored). This story ships the scaffold-body contract (the
    file's content is a real acceptance test that build-rust can
    drive green). The two contracts share the same CLI verb
    (`agentic test-build`) and the same crate (`agentic-test-
    builder`) — a fragmentation signal — but they have distinct
    observables (evidence shape / file presence / typed refusal vs.
    scaffold body structure / assertion semantics / greenability by
    implementation) and distinct UAT starting contexts (story 7's
    UAT centres on dirty-tree and thin-justification refusals
    against a fixture panic-stub; this story's UAT centres on
    greenability and reproducibility of claude-authored bodies).
    Per the splitting-rule's tiebreakers: distinct observable,
    distinct starting context — split. Consolidating would push
    story 7 from `healthy` back to `under_construction` on a
    contract addition that materially changes its UAT shape. The
    epic.yml for dag-primary-lens sets a direct precedent: stories
    10 and 13 share `agentic stories health` and are nonetheless
    separate by the same reasoning.

  Why NOT an ADR amendment with multi-story refactor.
    No new authority. ADR-0003 already permits the `claude`
    subprocess for subscription auth. No new evidence shape
    (ADR-0005 unchanged — this story layers inside story 7's shape,
    not outside it). No deprecation of a crate or cross-crate
    reshuffle. The scope of this shift is a single story.

  Prompt contract (auditable).
    The binary sends `claude -p` a prompt composed of the following
    fields, in this order, concatenated as a single user message:

      1. A fixed preamble naming the role: "You are authoring a
         single Rust integration test for a story's acceptance.
         The test must be red on a fresh checkout of this commit
         and greenable by editing only the target crate's `src/`."
      2. The story's `outcome` field verbatim.
      3. The SPECIFIC acceptance.tests[] entry's `justification`
         field verbatim.
      4. The target test file path (relative to repo root), so the
         body's `use` imports can reference the correct crate name
         (derived from the path: `crates/<name>/tests/...` implies
         `use <crate_name_snake>;`).
      5. The target crate's `Cargo.toml` [package] section (name,
         edition) so the scaffold's `use` path is correct.
      6. The target crate's `README.md` body if present, truncated
         to 4 KiB, so the scaffold respects crate-local idioms.
      7. At most ONE exemplar: the shortest healthy-sibling test
         file under `crates/*/tests/` whose file size is under 8
         KiB (chosen deterministically by file-name sort among
         siblings in the same crate, falling back to workspace-wide
         if none). Included verbatim as a style anchor. If no
         exemplar qualifies, omit the section — do NOT synthesise a
         stub exemplar.
      8. A fixed postamble listing forbidden outputs: no prose, no
         markdown fences, no `#[ignore]`, no `assert!(true)`, no
         trailing `panic!("...")` after real assertions; output is
         exactly one Rust source file starting with a doc comment
         and ending with a trailing newline.

    The prompt is assembled by a free function in the library
    (`build_scaffold_prompt(story, test_index, crate_ctx) -> String`)
    with exactly the field order above so future audits can diff
    prompts across versions. The function is pub(crate); the free-
    function shape exists for auditability, not extensibility.

    The captured stdout is `syn::parse_file`'d before write.
    `ScaffoldParseError` fires if parsing fails. A scaffold that
    parses but contains a `#[ignore]` attribute, an `assert!(true)`
    call, or a trailing unconditional `panic!` after real
    assertions is a future-work observability concern — NOT in this
    story's scope. If the need to pin those surfaces, a later story
    authors a static linter over scaffold bodies; treating it as an
    acceptance check now would over-spec the contract before real
    scaffold corpora exist to inform the rules.

  Determinism / cache contract.
    Cache path: `$AGENTIC_CACHE/test-builder/scaffolds/<sha256>.rs`
    where `$AGENTIC_CACHE` defaults to the platform equivalent of
    `$XDG_CACHE_HOME/agentic` (Linux: `~/.cache/agentic`; macOS:
    `~/Library/Caches/agentic`; Windows: `%LOCALAPPDATA%/agentic/
    cache`).

    Cache key: SHA-256 hex of the literal prompt string (i.e. the
    full assembled `claude -p` input). This means a change to the
    justification, the crate README, the exemplar choice, the
    crate's `Cargo.toml` [package] section, OR the preamble /
    postamble strings invalidates the cache entry — exactly the
    reproducibility envelope we want. The model id is NOT a
    separate key axis: if the caller overrides `claude`'s model,
    that surfaces in the subprocess spawn, not in the prompt, and
    is treated as out-of-scope for cache determinism. If this
    proves fragile, a future story adds `model_id` to the key.

    Cache miss: spawn `claude -p` with the prompt on stdin (or via
    argv — the implementation choice respects `claude-code-rs`
    conventions). On success (exit 0 + parseable Rust stdout),
    write the body verbatim to the cache file AND to the target
    scaffold path. On any non-success, fail closed per the
    failure-modes section below — do NOT cache a failed response.

    Cache hit: read the cache file, validate it still parses as
    Rust (a cosmic-ray guard), write its bytes verbatim to the
    target scaffold path. No `claude` spawn. The run summary
    names each entry as CACHE HIT or CACHE MISS so operators can
    audit coverage.

  Failure modes (all fail-closed with exit code 2).
    - `ClaudeUnavailable`: `claude` not on PATH, or the subprocess
      spawn fails before emitting output, or the subprocess exits
      non-zero with stderr indicating auth failure. Fires BEFORE
      any scaffold is written. Stored run-summary names the error.
    - `ClaudeTimeout { index }`: the subprocess for the Nth
      acceptance.tests[] entry exceeds the per-scaffold wall-clock
      budget. Default 120 seconds; overridable via
      `AGENTIC_TEST_BUILD_CLAUDE_TIMEOUT` (seconds, or a suffix-
      parsed duration — `120s`, `2m`). On timeout, SIGTERM the
      subprocess, roll back any scaffolds ALREADY WRITTEN for
      earlier justifications in the same story (delete them and
      any cache entry they produced in this run), write zero
      evidence. The story leaves no partial state.
    - `ScaffoldParseError { path, stderr }`: `claude` exited 0
      but stdout does not parse as a Rust source file. Same roll-
      back semantics as `ClaudeTimeout`.

    The roll-back guarantee is stronger than story 7's "fail-closed
    on the whole story" — story 7 never started writing scaffolds
    for a thin-justification story. This story DOES start writing
    (the subprocess per acceptance.tests[] entry runs sequentially;
    the Nth entry can fail after entries 1..N-1 have already been
    written). Roll-back restores the atomicity.

  Standalone-resilience posture.
    `agentic-test-builder` remains standalone-resilient-library-
    shaped (see the referenced pattern). The `claude` subprocess
    is spawned via a small in-crate helper (NOT a dependency on
    `agentic-runtime`, which depends on the world and would break
    the resilience posture). The helper uses `std::process::
    Command` and a streaming stdout capture with a timeout. This
    is a deliberate departure from the `Runtime` trait ADR-0003
    names; `Runtime` is for the orchestrator, which can afford
    the dependency. `test-build` is on the critical verify path
    (red-state evidence MUST be producible when the rest of the
    system is in flames) and therefore owns its own narrow
    subprocess shim. The crate's existing standalone-resilience
    test continues to cover the dependency floor; no new
    standalone test is needed because the floor is unchanged
    (no new crate dependency; `std::process` is already available).

  CLI shape (unchanged from story 7).
    `agentic test-build <id> [--store <path>]`. Argv is unchanged.
    The new failure modes surface as new stderr messages under
    exit code 2, same mapping as the dirty-tree refusal. No new
    flag, no `--no-claude` escape hatch, no `--model` override in
    this story (a future story may add one if concrete need
    arises).

  Environment variables.
    - `AGENTIC_TEST_BUILD_CLAUDE_TIMEOUT`: per-scaffold subprocess
      wall-clock budget. Default: 120s. Formats: bare integer
      (seconds), or a suffix-parsed duration (`30s`, `2m`, `500ms`).
      Malformed values are rejected at argv/env parse time with
      exit code 2.
    - `AGENTIC_CACHE`: root of the scaffold cache. Default:
      platform-equivalent cache dir. A non-existent directory
      is created on first write. A read-only directory at cache-
      write time surfaces as `TestBuilderError::Other` (store I/O
      failure), fail-closed.

    No `AGENTIC_DISABLE_CACHE` flag in this story. The cache is
    the determinism primitive — disabling it is the same as
    dropping the invariant. If operators need to force a refresh,
    `rm -rf $AGENTIC_CACHE/test-builder/scaffolds/` is the
    documented path.

  Test file locations.
    Library-level tests (seven tests:
    `scaffold_body_imports_target_crate_symbols.rs`,
    `scaffold_body_asserts_on_justification_observable.rs`,
    `scaffold_body_survives_implementation_turning_it_green.rs`,
    `scaffold_body_is_parseable_rust.rs`,
    `scaffold_body_is_cached_by_content_hash.rs`,
    `claude_unavailable_is_fail_closed.rs`,
    `claude_timeout_is_fail_closed.rs`) live under
    `crates/agentic-test-builder/tests/` as Rust integration
    tests. They use a stubbed `claude` binary on a tempdir PATH
    (the shim is a small shell script or a `tempfile`-authored
    Rust-compiled binary that reads stdin and emits deterministic
    stdout) so the test suite does NOT call real `claude`. The
    real `claude` binary is exercised only by the UAT walkthrough
    and by the CLI integration test below.

    Binary-level tests (one test:
    `test_build_invokes_claude_and_writes_real_scaffold.rs`) lives
    under `crates/agentic-cli/tests/` as a Rust integration test
    driven via `assert_cmd`. It uses the same stubbed-`claude`
    shim pattern so CI stays hermetic.

  Relationship to the patterns.
    `standalone-resilient-library` applies unchanged — the crate
    must still produce red-state evidence when the rest of the
    system is in flames. The in-crate `std::process::Command`
    helper preserves the dependency floor; adding a dependency on
    `agentic-runtime` would violate the pattern and is forbidden
    by this story.

    `fail-closed-on-dirty-tree` applies to the new failure modes
    the same way it applies to the dirty-tree gate: typed error,
    exit code 2, zero side effects on refusal. The three new
    failure modes (`ClaudeUnavailable`, `ClaudeTimeout`,
    `ScaffoldParseError`) are additional fail-closed axes on the
    same command; the pattern's contract fits them without
    modification.

  Relationship to the dag-primary-lens epic (stories 10-13).
    Story 10 is already `under_construction` and its
    implementation attempt surfaced this gap: build-rust cannot
    drive panic-stub scaffolds to green. Stories 11, 12, 13 are
    `proposed` and will hit the same wall when test-builder runs
    against their acceptance.tests[] entries. This story is a
    hard prerequisite for any of them reaching `healthy`. The
    epic's `depends_on` list should gain `14`; the epic.yml
    itself is touched only to record the new dependency, no
    other fields change.

  What this story explicitly does NOT do.
    - Does NOT extend the story schema (no new fields on story
      YAML). The scaffold cache is an on-disk side-artefact
      outside the story corpus.
    - Does NOT add a `--model` override, a `--no-claude` escape
      hatch, or any other flag to `agentic test-build`. The CLI
      surface is unchanged.
    - Does NOT lint scaffold bodies for `#[ignore]`, `assert!
      (true)`, or trailing panics. That is a future story's
      concern once real scaffold corpora exist to inform the
      rules; pre-specifying the linter here would over-constrain
      the claude-authored output before we know what the corpus
      looks like.

  Relationship to story 7.
    Story 7 remains `healthy`. Its tests continue to pass against
    the upgraded scaffold shape — as documented in "What is
    UNCHANGED" above. Story 7's guidance will need a small update
    after this story ships healthy, performed by a subsequent
    story-writer pass, which will auto-revert story 7 to
    `under_construction` per the system design. That is correct
    behaviour; attempting to pre-edit story 7 at this story's
    authoring time would re-open it prematurely.

