id: 7
title: "Record each story's red state before implementation begins"

outcome: |
  A developer running `agentic test-build <id>` receives a committed
  red-state record that is the only way to prove a story's acceptance
  tests were authored to fail first.

status: proposed

patterns:
  - standalone-resilient-library
  - fail-closed-on-dirty-tree

acceptance:
  tests:
    - file: crates/agentic-test-builder/tests/scaffolds_missing_files.rs
      justification: |
        Proves the runtime-red happy path: given a story whose
        acceptance.tests[] lists two file paths that do not exist
        on disk and whose justifications are substantive prose
        whose first line implies behaviour the fixture's existing
        implementation can already be CALLED into (imports resolve
        and the crate compiles) but that asserts a condition the
        implementation does not yet satisfy, `TestBuilder::run`
        writes both files as compilable Rust integration tests,
        runs each one, observes each fail with a `panic!` whose
        message is the justification's first line, and appends one
        red-state JSONL row to `evidence/runs/<id>/` with one
        `verdict: red` entry per scaffold, `red_path: "runtime"` on
        each entry, `diagnostic` equal to that first line of the
        panic message, and the current HEAD commit hash. Without
        this the whole contract is empty — red-state evidence is
        the artefact this agent exists to produce, and if the
        happy path does not write it the rest is theatre. The
        compile-red branch of the same evidence shape is pinned
        separately by `scaffolds_compile_red_variant.rs`.

    - file: crates/agentic-test-builder/tests/scaffolds_compile_red_variant.rs
      justification: |
        Proves the compile-red happy path — the second branch of
        the evidence row's `red_path` discriminant, currently
        unpinned if `scaffolds_missing_files.rs` covers only the
        runtime-red branch. Given a story whose acceptance.tests[]
        lists a file path that does not exist on disk and whose
        substantive justification implies a symbol (e.g. a public
        function, struct, or method) the fixture's implementation
        has not yet declared, `TestBuilder::run` writes a scaffold
        that references that symbol, `cargo check
        --package <crate> --test <name>` fails with a rustc error
        (not a runtime panic), and the red-state JSONL row for
        that scaffold carries `verdict: red`,
        `red_path: "compile"`, and `diagnostic` equal to the first
        line of the captured rustc error output. Runtime-red
        rows remain absent from this evidence row (or belong to a
        different scaffold in the same run). Without this, the
        evidence-shape contract covers only one side of the
        `red_path` enum — an implementation could default every
        row to `"runtime"` (or vice versa) and the rest of the
        suite would miss it, breaking the handshake with
        build-rust and UAT which branch on that discriminant.

    - file: crates/agentic-test-builder/tests/preserves_existing_tests.rs
      justification: |
        Proves preservation: given a story where one acceptance.tests[]
        entry points at a file that already exists with non-empty
        content, `TestBuilder::run` does not open the existing file,
        does not edit it, and does not overwrite it — the file's bytes
        on disk are byte-identical before and after the run. The
        preserved entry still appears in the red-state JSONL row with
        `verdict: preserved`. Without this, a second test-builder run
        against a story mid-implementation would silently re-redden a
        test the implementer has already turned green, which is the
        exact legacy failure mode this ADR is designed to prevent.

    - file: crates/agentic-test-builder/tests/fail_closed_dirty_tree.rs
      justification: |
        Proves the fail-closed contract on a dirty working tree: with
        any uncommitted change present (including an untracked file),
        `TestBuilder::run` returns `TestBuilderError::DirtyTree`, writes
        zero scaffolds, and writes zero evidence. Without this the
        red-state record can be forged — someone could edit code into
        the tree, then run test-builder, and the resulting evidence
        would claim those edits were red when they are not.

    - file: crates/agentic-test-builder/tests/rejects_thin_justification.rs
      justification: |
        Proves the thin-justification refusal: given a story whose
        acceptance.tests[] contains one entry with justification text
        `"TODO"` (or empty after trim, or a single token),
        `TestBuilder::run` returns `TestBuilderError::ThinJustification`
        naming the offending entry's index, writes zero scaffolds (even
        for the substantive entries in the same story), and writes zero
        evidence. Without this, story-writer could offload test design
        by stubbing justifications, and test-builder would produce
        scaffolds whose failure messages say nothing — green evidence
        for a story that was never meaningfully specified.

    - file: crates/agentic-test-builder/tests/evidence_row_shape.rs
      justification: |
        Proves the evidence shape that downstream agents (build-rust,
        `agentic uat`, `agentic-verify`) rely on: after a happy-path
        run the JSONL row contains exactly the keys `run_id` (UUID v4),
        `story_id`, `commit` (40-hex HEAD SHA), `timestamp` (ISO-8601
        UTC), and `verdicts`. `verdicts` is an array with one entry per
        acceptance.tests[].file keyed by `file`, with `verdict` in
        {`red`, `preserved`}. Red rows carry two additional fields:
        `red_path` in {`compile`, `runtime`} and `diagnostic` — the
        first line of the rustc error for compile-red, the first line
        of the panic message for runtime-red. Preserved rows carry
        neither `red_path` nor `diagnostic`. Without this, the
        handshake with build-rust and UAT is a conventions-not-contract
        situation — the next agent that reads the evidence file has
        nothing stable to parse against.

    - file: crates/agentic-test-builder/tests/empty_file_treated_as_missing.rs
      justification: |
        Proves the empty-file classification: given a story whose
        acceptance.tests[] entry points at a file that exists on disk
        but whose content is empty (zero bytes) or whitespace-only,
        `TestBuilder::run` treats it as SCAFFOLD (writes a real failing
        test into it and records a `red` verdict), not PRESERVED. The
        process.yml contract is "preserved means non-empty content";
        without a test pinning the empty-file case, a zero-byte file
        left behind by a prior failed run would be forever preserved
        as a no-op — re-rennying would never happen, and the story
        would never get a real scaffold.

    - file: crates/agentic-test-builder/tests/zero_acceptance_tests_is_escalation.rs
      justification: |
        Proves the zero-tests refusal: given a story whose
        `acceptance.tests` is an empty array (or absent), `TestBuilder::run`
        returns `TestBuilderError::NoAcceptanceTests` (or an equivalent
        typed variant), writes zero scaffolds, and writes zero
        evidence. The schema should block this at story-writer time,
        but the agent defends in depth — a story with zero executable
        tests would produce a zero-verdict evidence row, which is an
        attestation claiming "this story is red" without any observable
        to stand behind. The refusal makes the empty-acceptance case a
        story-writer escalation, not a silent green-from-nothing.

    - file: crates/agentic-test-builder/tests/adds_dev_deps_but_not_runtime_deps.rs
      justification: |
        Proves the narrow Cargo.toml authority granted by
        `agents/test/test-builder/contract.yml`: test-builder MAY
        append entries under `[dev-dependencies]` in the TARGET
        crate's `Cargo.toml` when a scaffold it is about to author
        would not compile without them (happy path — the entry
        appears, the scaffold compiles and fails red, and the run
        summary names each added dev-dep), but MUST NOT touch
        `[dependencies]`, `[build-dependencies]`, `[features]`,
        `[package]`, or any other section of that Cargo.toml, nor
        ANY other Cargo.toml in the workspace (root or sibling
        crates), nor `Cargo.lock`. A fixture that requests a
        runtime-deps edit — or any non-`[dev-dependencies]` mutation
        — causes `TestBuilder::run` to return a typed out-of-scope
        error variant (implementation choice; suggest
        `TestBuilderError::OutOfScopeEdit`), write zero scaffolds,
        write zero evidence, and leave every Cargo.toml in the
        workspace bytes-identical to its pre-run state. Without this
        test the narrow Cargo.toml authority in contract.yml is
        ungated — an implementer could silently widen
        test-builder's reach into runtime deps or the workspace
        root, turning the red-state writer into a build-graph
        mutator, and the fail-closed-on-dirty-tree pattern cannot
        catch it (these edits would be perfectly clean on commit).

  uat: |
    Goal: convince yourself that `agentic test-build` writes red-state
    evidence only on a clean tree, never overwrites existing tests,
    refuses thin justifications, and produces evidence downstream
    agents can parse.

    Setup:
      1. From a clean checkout, run `git status --porcelain` and
         confirm the output is empty.
      2. Confirm `stories/7.yml` (this story) exists. Confirm at least
         one OTHER `stories/N.yml` exists with `status: proposed`, with
         acceptance.tests[] pointing at files that do not exist on
         disk yet, and with substantive justifications. If no such
         story exists, stop — this UAT cannot run until a second
         scaffoldable story is on disk.

    Happy path:
      3. Run `agentic test-build <other-id>`.
      4. Observe the summary names one file per acceptance.tests[]
         entry, classified as CREATED or PRESERVED.
      5. Run `git status --porcelain`. Confirm the only untracked
         paths are the newly written scaffolds plus one
         `evidence/runs/<other-id>/<timestamp>-red.jsonl`.
      6. `cat` the evidence file. Confirm the JSON row contains
         `run_id`, `story_id`, `commit`, `timestamp`, and `verdicts`;
         and that every acceptance.tests[].file path appears in
         `verdicts` exactly once.
      7. For each CREATED row, inspect the evidence row's `red_path`.
         If `compile`: run `cargo check --workspace --tests` and
         confirm it fails with a rustc error whose first line matches
         the row's `diagnostic` field (the scaffold references a
         symbol the implementation has not yet declared). If
         `runtime`: run `cargo test --package <crate> --test <name>`
         and confirm the test fails with a panic whose first line
         matches the row's `diagnostic` field.

    Preservation check:
      8. Revert the untracked scaffolds and evidence from the happy
         path (`git clean -fd`).
      9. Pick one acceptance.tests[].file from the target story and
         create it by hand with a single Rust `#[test]` body like
         `#[test] fn placeholder() { panic!("human-authored"); }`.
         Commit it.
     10. Re-run `agentic test-build <other-id>`.
     11. Confirm the hand-authored file's bytes on disk match before
         and after (diff its content against the git-committed version
         — identical). Confirm the evidence row for that path shows
         `verdict: preserved`.

    Dirty-tree refusal:
     12. `git clean -fd` the created artefacts. Touch a random file
         (e.g. `echo '' >> README.md`).
     13. Run `agentic test-build <other-id>`. Confirm it exits
         non-zero with a message naming `DirtyTree`, writes no
         scaffolds, and writes no evidence.

    Thin-justification refusal:
     14. `git checkout -- README.md` to clean the tree.
     15. Edit the target story so one acceptance.tests[] entry's
         justification is the literal string `"TODO"`. Commit.
     16. Run `agentic test-build <other-id>`. Confirm it exits
         non-zero with a message naming `ThinJustification` and the
         offending entry's index, writes no scaffolds (even for the
         other entries), and writes no evidence.

    Cleanup:
     17. `git reset --hard <SHA-before-UAT>` to restore the working
         tree and the story. Confirm `git status --porcelain` is empty
         and the target story's acceptance.tests[] justifications are
         back to substantive text.

guidance: |
  This story is the meta-story for ADR-0005 ("Red-green is a contract,
  not a convention") — the same role story 1 plays for `agentic uat`.
  It proves the contract end-to-end against a second, unrelated story;
  it does NOT attempt to verify its own red state recursively. The
  crate under test is `agentic-test-builder`, a standalone-resilient
  library (see the referenced pattern) with a thin CLI shim at
  `agentic test-build`.

  Key invariants the tests collectively pin down:

  - **Red-state evidence is a committable atomic — see the
    fail-closed-on-dirty-tree pattern.** Test-builder runs only on a
    clean working tree (`git status --porcelain` empty). On a dirty
    tree it returns `TestBuilderError::DirtyTree`, writes nothing,
    exits non-zero per the pattern's exit-code mapping. No partial
    runs, no "best effort" evidence.

  - **Existing tests are bytes-immutable.** If an acceptance.tests[]
    entry points at a file with non-empty content, that file is not
    opened for writing and is not opened for reading beyond an
    existence check. The file's hash on disk before and after the
    run must be identical.

  - **Scaffold shape is deterministic from justification.** Given the
    same justification text, test-builder produces a byte-identical
    Rust scaffold. The test's function name is a snake_case reduction
    of the first sentence; the `panic!(..)` message is the
    justification's first line; there is no timestamp, UUID, or other
    non-deterministic content in the scaffold body. This property
    lets the preservation test above compare bytes directly.

  - **Evidence shape is the handshake.** The JSONL row's keys are
    fixed (`run_id`, `story_id`, `commit`, `timestamp`, `verdicts`).
    Each verdict carries `file`, `verdict`, and — for `red` only —
    `red_path` (one of `compile`, `runtime`) and `diagnostic` (the
    first line of the rustc error for compile-red, the first line of
    the panic message for runtime-red, each captured from a real
    `cargo check` or `cargo test` invocation). Preserved rows carry
    neither `red_path` nor `diagnostic`. Downstream agents parse this
    shape; changing it is a breaking change that requires an ADR
    update, not a code change.

  - **`agentic test-build` is the red-state creator, not a runner.**
    The verb creates failing scaffolds for stories that do not yet
    have them, on a clean tree, and records the red-state evidence.
    It is distinct from `agentic stories test <selector>` (story 12),
    which RUNS already-committed acceptance tests across a DAG
    subtree and records per-story `test_runs` rows. test-build
    writes JSONL under `evidence/runs/<id>/`; `stories test` writes
    upserted rows to the `test_runs` table. The two verbs do not
    share a code path and do not share an exit-code contract.

  - **Thin-justification detection is local.** The refusal rule is
    evaluated per acceptance.tests[] entry independently: thin =
    empty after trim, OR a single whitespace-delimited token, OR
    matches /^\s*(TODO|TBD|\.\.\.)\s*$/i. A single thin entry halts
    the whole story's run — partial scaffolding on a story with a
    thin entry would undermine the guarantee that every scaffold has
    a justification worth reading.

  - **Red-evidence path is conventional, not schema'd.** The story
    schema does NOT encode an evidence path field (see ADR-0005's
    deferred alternative). The path
    `evidence/runs/<story-id>/<timestamp>-red.jsonl` is derived by
    test-builder and read by downstream agents by the same
    convention. If this proves fragile, a future ADR adds the path
    to the schema — until then, the derivation is the contract.

  - **Pre-ADR-0005 scaffolds are handled by preservation, not special
    code paths.** Stories that were `under_construction` before
    ADR-0005 was accepted may carry test files that an earlier
    build-rust produced. The preservation rule treats them exactly
    like any other existing file — classified as PRESERVED, never
    re-opened for write. No migration branch in the code; the
    invariant "existing file is bytes-immutable" already covers it.

  - **Relationship to story 11 (UAT ancestor gate).** Story 7 and
    story 11 touch the same concept (red-state / healthy-state
    evidence) but produce DIFFERENT artefacts with NO runtime
    interaction. This story (test-builder) writes JSONL files to
    `evidence/runs/<id>/` — append-only, on-disk, one file per
    red-state observation at a commit. Story 11 (UAT ancestor
    gate) reads `uat_signings` rows from the store — upserted,
    in-DB, one row per Pass verdict. Neither artefact is read or
    written by the other's code path; test-builder never consults
    `uat_signings`, and `agentic uat` never reads
    `evidence/runs/`. Reconciling the two into a single "is this
    story's proof complete end-to-end" check is the job of a
    future `agentic-verify` (its own story, not yet written and
    explicitly out of scope here). Until that story exists, the
    two artefacts live side-by-side and downstream tooling reads
    whichever one answers its question.

  Why depends_on is [6] and not [2]. test-builder reads the target
    story's YAML via `agentic-story`'s loader (story 6) — it needs a
    typed Story value with validated `acceptance.tests[]` before it
    can classify scaffolds. It does NOT write to the `test_runs`
    table (story 2's concern); its bookkeeping is the JSONL file
    under `evidence/runs/<id>/`. Story 2's recorder and this story's
    evidence file are independent — they track different facts (one
    row per story's latest CI result vs. one file per red-state
    observation at a specific commit). A future `agentic-verify`
    that reconciles the two is a separate story.

depends_on:
- 6
